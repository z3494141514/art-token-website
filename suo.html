        * { margin: 0; padding: 0; box-sizing: border-box; }

        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.03; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.3) 3px, rgba(255,255,255,0.3) 4px); }
        .container { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
        .navbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
        .navbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-bright); }
        .navbar-logo { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #1a1a2e, #2a2030); border: 2px solid var(--gold-dark); display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 18px var(--shadow-gold); flex-shrink: 0; }

        .navbar-subtitle { font-size: 0.7rem; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }

        .hero-title { font-family: var(--font-military); font-size: clamp(2rem,5vw,3.2rem); font-weight: bold; letter-spacing: 4px; color: var(--text-bright); margin-bottom: 8px; text-shadow: 0 0 30px rgba(201,160,80,0.25); }
        .hero-title .accent { color: var(--gold); }

        .stat-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent, var(--shadow-gold), transparent, transparent, transparent, var(--shadow-gold), transparent); animation: statRotate 8s linear infinite; opacity: 0.5; z-index: 0; }

        .section-title { font-family: var(--font-military); font-size: 1.4rem; letter-spacing: 3px; color: var(--text-bright); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }

        .lock-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; transition: all 0.3s ease; position: relative; overflow: hidden; will-change: transform; }

        .status-waiting { background: rgba(201,160,80,0.15); color: var(--gold); border: 1px solid var(--border-gold); }
        .status-claimed { background: rgba(138,135,128,0.15); color: var(--text-dim); border: 1px solid var(--border); }
        .status-cliff { background: rgba(192,57,43,0.25); color: #e74c3c; border: 1px solid rgba(231,76,60,0.4); }
        .lock-amount { font-size: 1.8rem; font-weight: bold; color: var(--gold); font-family: var(--font-military); display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }

        .lock-token { font-size: 0.9rem; color: var(--gold); font-weight: 500; }
        .lock-time { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }
        .lock-countdown { font-size: 1.1rem; font-weight: 600; color: var(--gold-light); letter-spacing: 1px; margin-top: 2px; font-variant-numeric: tabular-nums; will-change: contents; }
        .btn-claim { display: inline-flex; align-items: center; gap: 8px; padding: 10px 28px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; border: none; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #1a1a10; letter-spacing: 2px; margin-top: 12px; width: 100%; justify-content: center; position: relative; overflow: hidden; min-height: 44px; }
        .btn-claim:hover:not(:disabled) { box-shadow: 0 0 28px rgba(201,160,80,0.5); transform: translateY(-2px); filter: brightness(1.1); }
        .btn-claim:disabled { background: #3a3a40; color: #6a6a6a; cursor: not-allowed; }
        .btn-claim.loading { pointer-events: none; opacity: 0.7; }
        .btn-claim .spinner { display: none; width: 18px; height: 18px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn-claim.loading .spinner { display: inline-block; }
        .btn-claim.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-claim-not-owner { font-size: 0.75rem; color: #e74c3c; text-align: center; margin-top: 8px; padding: 6px 12px; border: 1px dashed rgba(231,76,60,0.4); border-radius: 50px; }
        .vest-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; transition: all 0.3s ease; will-change: transform; }
        .vest-card:hover { border-color: var(--border-gold); box-shadow: 0 4px 24px var(--shadow-gold); transform: translateY(-2px); }
        .vest-card.not-owner { border-color: rgba(192,57,43,0.3); }
        .vest-card.not-owner:hover { transform: none; box-shadow: none; border-color: rgba(192,57,43,0.3); }
        .vest-card.completed { opacity: 0.55; cursor: default; }
        .vest-card.completed:hover { transform: none; box-shadow: none; }
        .vest-progress { width: 100%; height: 6px; background: #1a1a24; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .vest-progress-bar { height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); border-radius: 3px; transition: width 0.3s ease; will-change: width; }
        .vest-note { font-size: 0.7rem; color: var(--gold-light); margin-top: 2px; letter-spacing: 1px; }
        .btn-claim-vest { display: inline-flex; align-items: center; gap: 8px; padding: 10px 28px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; border: 1px solid var(--gold); background: transparent; color: var(--gold); letter-spacing: 2px; margin-top: 12px; width: 100%; justify-content: center; position: relative; overflow: hidden; min-height: 44px; }
        .btn-claim-vest:hover:not(:disabled) { background: rgba(201,160,80,0.15); box-shadow: 0 0 28px var(--shadow-gold); transform: translateY(-2px); }
        .btn-claim-vest:disabled { border-color: #3a3a40; color: #6a6a6a; cursor: not-allowed; background: transparent; }
        .btn-claim-vest.loading { pointer-events: none; opacity: 0.7; }
        .btn-claim-vest .spinner { display: none; width: 18px; height: 18px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn-claim-vest.loading .spinner { display: inline-block; }
        .btn-claim-vest.loading .btn-text { display: none; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--bg-card); border: 1px solid var(--border-gold); color: var(--text-bright); padding: 14px 22px; border-radius: var(--radius-sm); font-size: 0.9rem; box-shadow: 0 8px 30px rgba(0,0,0,0.5); pointer-events: auto; cursor: pointer; animation: toastIn 0.35s ease, toastOut 0.35s ease 2.5s forwards; max-width: 320px; letter-spacing: 1px; }
        .toast.success { border-color: rgba(92,184,92,0.5); background: rgba(45,80,22,0.5); }
        .toast.error { border-color: rgba(192,57,43,0.5); background: rgba(155,30,30,0.4); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(60px); } }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state p { letter-spacing: 2px; font-size: 0.9rem; }
        @media (max-width: 480px) {
            .navbar { flex-direction: column; align-items: flex-start; }
            .btn-connect { width: 100%; justify-content: center; }
            .stat-value { font-size: 1.8rem; }
            .hero-title { letter-spacing: 2px; }
            .lock-card, .vest-card { padding: 16px 18px; }
            .lock-amount { font-size: 1.4rem; }
            .lock-amount .amount-num { font-size: 1.6rem; }
            .btn-claim, .btn-claim-vest { font-size: 0.8rem; padding: 8px 20px; min-height: 44px; }
            footer { font-size: 0.65rem; padding: 16px 0; }
        }
    </style>
</head>

    <script src="./ethers.umd.min.js"></script>
    <script>
        (function waitForEthers(callback) {
            if (typeof ethers !== 'undefined') { callback(); return; }
            var script = document.createElement('script');
            script.src = 'https://cdn.bootcdn.net/ajax/libs/ethers/5.7.2/ethers.umd.min.js';
            script.onload = callback;
            script.onerror = function() {
                document.getElementById('totalLocked').textContent = 'ethers 加载失败';
                document.getElementById('totalLockedSub').textContent = '请检查网络后刷新';
            };
            document.head.appendChild(script);
        })(function() {
            const CONFIG = {
                CONTRACT_ADDRESS: '0x3d4F23636A149930EAa69a4ACaba50fd8E1Eb1Ed',
                CHAIN_ID: 97,
                CHAIN_ID_HEX: '0x61',
                RPC_URLS: [
                    'https://bsc-testnet-rpc.publicnode.com',
                    'https://bsc-testnet.nodereal.io/v1/64a9df0874fb4a93b9d0a3849de012d3',
                    'https://data-seed-prebsc-1-s1.binance.org:8545/',
                    'https://data-seed-prebsc-2-s1.binance.org:8545/'
                ],
                TOTAL_REFRESH_INTERVAL: 60,
                CACHE_DURATION: 30000,
                MULTICALL_BATCH_SIZE: 30
            };

            const MULTICALL_ADDR = '0xca11bde05977b3631167028862be2a173976ca11';
            const MULTICALL_ABI = ["function aggregate3(tuple(address target, bool allowFailure, bytes callData)[] calls) view returns (tuple(bool success, bytes returnData)[])"];
            const CONTRACT_ABI = [
                "function lockCount() view returns (uint256)","function vestCount() view returns (uint256)",
                "function tokenLocks(uint256) view returns (address token, address beneficiary, uint256 amount, uint256 unlockTime, bool withdrawn)",
                "function tokenVests(uint256) view returns (address token, address beneficiary, uint256 totalAmount, uint256 cliffTime, uint256 endTime, uint256 releaseInterval, uint256 lastClaimTime, uint256 released)",
                "function withdrawLock(uint256 lockId) external","function withdrawVest(uint256 vestId) external"
            ];

            let cachedProvider = null, currentRpcIndex = 0;
            let provider, signer, contract, userAddress;
            let isClaiming = false, isTimerRunning = false, pageVisible = true;
            let lastTick = 0, totalRefreshCounter = 0;

            const cacheStore = { lockData: null, vestData: null, timestamp: 0 };
            const tokenCache = {};
            const invalidTokenCache = new Set();

            const dataStore = {
                lock: { all: [], personal: [], allCompleted: [], personalCompleted: [] },
                vest: { all: [], personal: [], allCompleted: [], personalCompleted: [] },
                currentView: { lock: 'all', vest: 'all' }
            };

            const renderedCards = { lock: {}, vest: {} };

            const $ = id => document.getElementById(id);
            const totalLockedEl = $('totalLocked'), totalLockedSubEl = $('totalLockedSub');
            const lockListEl = $('lockList'), vestListEl = $('vestList');
            const btnConnect = $('btnConnect'), btnConnectText = $('btnConnectText');
            const btnRefreshTotal = $('btnRefreshTotal');
            const toastContainer = $('toastContainer');

            function formatAddress(addr) { return addr ? addr.substring(0, 6) + '...' + addr.substring(addr.length - 4) : ''; }
            function animateNumberUpdate(el, t) { el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 300); el.textContent = t; }
            function formatDateTime(t) { const d = new Date(t*1000), p = n => String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
            function formatCountdown(s) { if(s<=0)return'剩余 00:00:00'; const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),ss=s%60,p=n=>String(n).padStart(2,'0'); let r=''; if(d>0)r+=`${d}天 `; r+=`${p(h)}:${p(m)}:${p(ss)}`; return`剩余 ${r}`; }
            function showToast(m, t='') { const to = document.createElement('div'); to.className = `toast ${t}`; to.textContent = m; to.addEventListener('click', ()=>to.remove()); setTimeout(() => { if(to.parentNode) to.remove(); }, 3000); toastContainer.appendChild(to); }

            async function getProvider(force = false) {
                if (cachedProvider && !force) {
                    try { await cachedProvider.getNetwork(); return cachedProvider; } catch (e) { cachedProvider = null; }
                }
                for (let i = 0; i < CONFIG.RPC_URLS.length; i++) {
                    const idx = (currentRpcIndex + i) % CONFIG.RPC_URLS.length;
                    try {
                        const p = new ethers.providers.JsonRpcProvider(CONFIG.RPC_URLS[idx]);
                        await p.getNetwork();
                        cachedProvider = p;
                        currentRpcIndex = idx;
                        return p;
                    } catch (e) {}
                }
                throw new Error('所有 RPC 节点不可用');
            }

            function getCachedData(key) {
                if (cacheStore[key] && Date.now() - cacheStore.timestamp < CONFIG.CACHE_DURATION) return cacheStore[key];
                return null;
            }

            function updateLockCards(now) {
                const view = dataStore.currentView.lock;
                const isCompletedView = view.includes('Completed');
                const group = renderedCards.lock[`lock_${view}`];
                if (!group) return;

                            if(els.btn && !isClaiming){ els.btn.style.display='flex'; els.btn.disabled=false; els.btn.innerHTML='<span class="spinner"></span><span class="btn-text">🔥 立即领取</span>'; els.btn.onclick=()=>claimLock(lock.id); }
                        } else { updateCountdown(lock.unlockTime - now, els.status, els.countdown); if(els.btn){ els.btn.style.display='flex'; els.btn.disabled=true; } }
                    }
                });
            }

            function updateVestCards(now) {
                const view = dataStore.currentView.vest;
                const isCompletedView = view.includes('Completed');
                const group = renderedCards.vest[`vest_${view}`];
                if (!group) return;
                Object.values(group).forEach(card => {
                    const vestId = parseInt(card.el.getAttribute('data-vest-id'));
                    const vest = dataStore.vest[view]?.find(v => v.id === vestId);
                    if (!vest) return;
                    const els = card.els;
                    let progress = 0, isCliff = now < vest.cliffTime;
                    if(now >= vest.cliffTime){ const tp = vest.endTime - vest.cliffTime; const rt = Math.min(now - vest.cliffTime, tp); progress = tp>0 ? (rt/tp)*100 : 100; }
                    progress = Math.min(100, Math.max(0, progress));
                    if(els.progressBar) els.progressBar.style.width = `${progress.toFixed(1)}%`;
                    if(els.progressText) els.progressText.textContent = `释放进度：${progress.toFixed(1)}%`;
                    const total = parseFloat(ethers.utils.formatUnits(vest.totalAmount, vest.decimals));
                    const released = parseFloat(ethers.utils.formatUnits(vest.released, vest.decimals));
                    let unlockable = 0;
                    if(now >= vest.cliffTime){ const el = now - vest.cliffTime; const tp = vest.endTime - vest.cliffTime; const ve = tp>0 ? (total*el)/tp : total; unlockable = Math.max(0, ve - released); if(unlockable > total - released) unlockable = total - released; }
                    if(els.available) els.available.textContent = `可领取：${unlockable.toLocaleString('zh-CN',{maximumFractionDigits:2})} ${vest.symbol}`;
                    const isFullyReleased = vest.released.gte(vest.totalAmount);
                    if(els.status){ if(isCompletedView || isFullyReleased || progress >= 100){ els.status.className='lock-status status-ready'; els.status.textContent='✅ 已完全释放'; } else if(isCliff){ els.status.className='lock-status status-cliff'; els.status.textContent='🔒 悬崖期锁定中'; } else { els.status.className='lock-status status-waiting'; els.status.textContent='📈 释放中'; } }
                    if(isCompletedView || isFullyReleased){
                        if(els.btn){ els.btn.style.display='flex'; els.btn.disabled=true; els.btn.textContent='已全部释放'; }
                        if(els.notOwner) els.notOwner.style.display='none';
                    } else if(!vest.isOwner && view === 'all'){
                        if(isCliff){ if(els.btn){ els.btn.style.display='flex'; els.btn.disabled=true; els.btn.textContent=`⏳ 释放倒计时 ${formatCountdown(vest.cliffTime-now)}`; } if(els.notOwner) els.notOwner.style.display='none'; }
                        else { if(els.btn) els.btn.style.display='none'; if(els.notOwner){ els.notOwner.style.display='block'; els.notOwner.textContent='这不是您的锁仓无法领取哦！'; } }
                    } else {
                        if(els.notOwner) els.notOwner.style.display='none';
                        if(els.btn){
                            els.btn.style.display='flex';
                            const canClaim = !isCliff && !isFullyReleased && (now >= vest.endTime || vest.released.eq(0) || now >= vest.lastClaimTime + vest.releaseInterval);
                            if(isFullyReleased){ els.btn.disabled=true; els.btn.textContent='✅ 已全部释放'; }
                            else if(canClaim){ els.btn.disabled=false; els.btn.textContent='🔥 领取代币'; els.btn.onclick=()=>claimVest(vest.id); }
                            else if(isCliff){ els.btn.disabled=true; els.btn.textContent=`⏳ 释放倒计时 ${formatCountdown(vest.cliffTime-now)}`; }
                            else { els.btn.disabled=true; els.btn.textContent=`⏳ 下次可领：${formatDateTime(vest.lastClaimTime + vest.releaseInterval)}`; }
                        }
                    }
                });

            function updateCountdown(remaining, statusEl, countdownEl) {
                const d = Math.floor(remaining/86400), h = Math.floor((remaining%86400)/3600), m = Math.floor((remaining%3600)/60), s = remaining%60;
                let str = ''; if(d>0) str += `${d}天 `; str += `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                if(countdownEl) countdownEl.textContent = str;
                if(statusEl){ statusEl.className='lock-status status-waiting'; statusEl.textContent='⏳ 等待解锁'; }
            }

            async function loadAllData(force = false) {
                if (!force) {
                    const cachedLock = getCachedData('lockData'), cachedVest = getCachedData('vestData');
                    if (cachedLock && cachedVest) { await applyCachedData(); return; }
                }
                try {
                    const rp = await getProvider();
                    const lc = new ethers.Contract(CONFIG.CONTRACT_ADDRESS, CONTRACT_ABI, rp);
                    const [lcB, vcB] = await Promise.all([lc.lockCount(), lc.vestCount()]);
                    const lockCount = lcB.toNumber(), vestCount = vcB.toNumber();
                    const lockCalls = buildCalls(CONFIG.CONTRACT_ADDRESS, CONTRACT_ABI, 'tokenLocks', Array.from({length: lockCount}, (_,i)=>[i+1]));
                    const vestCalls = buildCalls(CONFIG.CONTRACT_ADDRESS, CONTRACT_ABI, 'tokenVests', Array.from({length: vestCount}, (_,i)=>[i+1]));
                    const allCalls = [...lockCalls, ...vestCalls];
                    const results = await multicallWithPagination(rp, allCalls);
                    const locks = decodeResults(results.slice(0, lockCount), CONTRACT_ABI, 'tokenLocks');
                    const vests = decodeResults(results.slice(lockCount), CONTRACT_ABI, 'tokenVests');
                    setCachedData('lockData', locks); setCachedData('vestData', vests);
                    await Promise.all([loadTotalLockedFromData(locks, vests, rp), processLocks(locks, rp), processVests(vests, rp)]);
                } catch(e) {
                    const backup = await getProvider(true);
                    const lc = new ethers.Contract(CONFIG.CONTRACT_ADDRESS, CONTRACT_ABI, backup);
                    const [lcB, vcB] = await Promise.all([lc.lockCount(), lc.vestCount()]);
                    const lockCount = lcB.toNumber(), vestCount = vcB.toNumber();
                    const lockCalls = buildCalls(CONFIG.CONTRACT_ADDRESS, CONTRACT_ABI, 'tokenLocks', Array.from({length: lockCount}, (_,i)=>[i+1]));
                    const vestCalls = buildCalls(CONFIG.CONTRACT_ADDRESS, CONTRACT_ABI, 'tokenVests', Array.from({length: vestCount}, (_,i)=>[i+1]));
                    const allCalls = [...lockCalls, ...vestCalls];
                    const results = await multicallWithPagination(backup, allCalls);
                    const locks = decodeResults(results.slice(0, lockCount), CONTRACT_ABI, 'tokenLocks');
                    const vests = decodeResults(results.slice(lockCount), CONTRACT_ABI, 'tokenVests');
                    setCachedData('lockData', locks); setCachedData('vestData', vests);
                    await Promise.all([loadTotalLockedFromData(locks, vests, backup), processLocks(locks, backup), processVests(vests, backup)]);
                }
            }

            async function multicallWithPagination(provider, calls) {
                if (calls.length <= CONFIG.MULTICALL_BATCH_SIZE) return await multicall(provider, calls);
                let results = [];
                for (let i = 0; i < calls.length; i += CONFIG.MULTICALL_BATCH_SIZE) {
                    const batch = calls.slice(i, i + CONFIG.MULTICALL_BATCH_SIZE);
                    results = results.concat(await multicall(provider, batch));
                }
                return results;
            }

            async function multicall(p, c) { return (new ethers.Contract(MULTICALL_ADDR, MULTICALL_ABI, p)).aggregate3(c); }
            function buildCalls(ca,abi,m,pl){ const iface = new ethers.utils.Interface(abi); return pl.map(ps=>({target:ca,allowFailure:true,callData:iface.encodeFunctionData(m,ps)})); }
            function decodeResults(r,abi,m){ const iface = new ethers.utils.Interface(abi); return r.map(rr=>rr.success?iface.decodeFunctionResult(m,rr.returnData):null); }

            async function applyCachedData() {
                const locks = cacheStore.lockData, vests = cacheStore.vestData;
                if (locks && vests) { const rp = await getProvider(); await Promise.all([loadTotalLockedFromData(locks, vests, rp), processLocks(locks, rp), processVests(vests, rp)]); }
            }

            async function loadTotalLockedFromData(locks, vests, p) {
                try {
                    const ta = {}; let alc = 0, avc = 0; const it = new Set();
                    locks.forEach(l => { if(l && !l.withdrawn){ alc++; const a = l.token.toLowerCase(); it.add(a); if(!ta[a])ta[a]=ethers.BigNumber.from(0); ta[a]=ta[a].add(l.amount); } });
                    vests.forEach(v => { if(v && v.released.lt(v.totalAmount)){ avc++; const rem = v.totalAmount.sub(v.released), a = v.token.toLowerCase(); it.add(a); if(!ta[a])ta[a]=ethers.BigNumber.from(0); ta[a]=ta[a].add(rem); } });
                    const tim = await fetchTokenInfos(p, Array.from(it));
                    const parts = [];
                    for(const [a, am] of Object.entries(ta)){ if(am.gt(0)){ const info = tim[a] || {symbol:'TOKEN',decimals:18}; const num = parseFloat(ethers.utils.formatUnits(am,info.decimals)); if(num>0)parts.push(num.toLocaleString('zh-CN',{maximumFractionDigits:2})); } }
                    animateNumberUpdate(totalLockedEl, parts.length?parts.join(' + '):'0');
                    totalLockedSubEl.innerHTML = `一次性锁仓 <span class="stat-num">${alc}</span> 笔 · 线性锁仓释放 <span class="stat-num">${avc}</span> 笔`;
                } catch(e){ totalLockedEl.textContent='加载失败'; totalLockedSubEl.textContent='点击刷新重试'; }
            }

            async function loadTotalLocked(p) {
                try {
                    const lc = new ethers.Contract(CONFIG.CONTRACT_ADDRESS,CONTRACT_ABI,p);
                    const[lcB,vcB] = await Promise.all([lc.lockCount(),lc.vestCount()]);
                    const tlc = lcB.toNumber(), tvc = vcB.toNumber();
                    const lCalls = buildCalls(CONFIG.CONTRACT_ADDRESS,CONTRACT_ABI,'tokenLocks',Array.from({length:tlc},(_,i)=>[i+1]));
                    const vCalls = buildCalls(CONFIG.CONTRACT_ADDRESS,CONTRACT_ABI,'tokenVests',Array.from({length:tvc},(_,i)=>[i+1]));
                    const[lRes,vRes] = await Promise.all([multicall(p,lCalls),multicall(p,vCalls)]);
                    const locks = decodeResults(lRes,CONTRACT_ABI,'tokenLocks'), vests = decodeResults(vRes,CONTRACT_ABI,'tokenVests');
                    await loadTotalLockedFromData(locks, vests, p);
                } catch(e){ totalLockedEl.textContent='加载失败'; totalLockedSubEl.textContent='点击刷新重试'; }
            }

            async function processLocks(locks, p) {
                const allTokens = new Set();
                const raw = [];
                locks.forEach((l, idx) => {
                    if(!l || !l.beneficiary || l.beneficiary === ethers.constants.AddressZero) return;
                    const isOwner = userAddress && l.beneficiary.toLowerCase() === userAddress.toLowerCase();
                    raw.push({ id: idx+1, token: l.token, amount: l.amount, unlockTime: l.unlockTime.toNumber(), withdrawn: l.withdrawn, isOwner, beneficiary: l.beneficiary });
                    allTokens.add(l.token.toLowerCase());
                });
                const tim = await fetchTokenInfos(p, Array.from(allTokens));
                const grouped = { all:[], personal:[], allCompleted:[], personalCompleted:[] };
                raw.forEach(l => {
                    const info = tim[l.token.toLowerCase()] || {symbol:'TOKEN', decimals:18};
                    l.symbol = info.symbol; l.decimals = info.decimals;
                    if(l.withdrawn){ grouped.allCompleted.push(l); if(l.isOwner) grouped.personalCompleted.push(l); }
                    else { grouped.all.push(l); if(l.isOwner) grouped.personal.push(l); }
                });
                // 按解锁时间升序
                Object.keys(grouped).forEach(k => grouped[k].sort((a,b) => a.unlockTime - b.unlockTime));
                Object.keys(grouped).forEach(k => dataStore.lock[k] = grouped[k]);
                updateCountDisplays('lock');
                switchLockView(dataStore.currentView.lock);
            }

            async function processVests(vests, p) {
                const allTokens = new Set();
                const raw = [];
                vests.forEach((v, idx) => {
                    if(!v || !v.beneficiary || v.beneficiary === ethers.constants.AddressZero) return;
                    const isOwner = userAddress && v.beneficiary.toLowerCase() === userAddress.toLowerCase();
                    const isCompleted = v.released.gte(v.totalAmount);
                    raw.push({ id: idx+1, token: v.token, totalAmount: v.totalAmount, cliffTime: v.cliffTime.toNumber(), endTime: v.endTime.toNumber(), releaseInterval: v.releaseInterval.toNumber(), lastClaimTime: v.lastClaimTime.toNumber(), released: v.released, isOwner, isCompleted, beneficiary: v.beneficiary });
                    allTokens.add(v.token.toLowerCase());
                });
                const tim = await fetchTokenInfos(p, Array.from(allTokens));
                const grouped = { all:[], personal:[], allCompleted:[], personalCompleted:[] };
                raw.forEach(v => {
                    const info = tim[v.token.toLowerCase()] || {symbol:'TOKEN', decimals:18};
                    v.symbol = info.symbol; v.decimals = info.decimals;
                    if(v.isCompleted){ grouped.allCompleted.push(v); if(v.isOwner) grouped.personalCompleted.push(v); }
                    else { grouped.all.push(v); if(v.isOwner) grouped.personal.push(v); }
                });
                // 按悬崖结束时间升序
                Object.keys(grouped).forEach(k => grouped[k].sort((a,b) => a.cliffTime - b.cliffTime));
                Object.keys(grouped).forEach(k => dataStore.vest[k] = grouped[k]);
                updateCountDisplays('vest');
                switchVestView(dataStore.currentView.vest);
            }

            async function fetchTokenInfos(p, addrs) {
                const unc = []; const rm = {};
                for(const a of addrs) {
                    const cached = getTokenInfo(a);
                    if (cached) { rm[a] = cached; }
                    else if (!invalidTokenCache.has(a.toLowerCase())) { unc.push(a); }
                }
                if(unc.length > 0) {
                    const sc = unc.map(a => ({target:a,allowFailure:true,callData:new ethers.utils.Interface(['function symbol() view returns (string)']).encodeFunctionData('symbol')}));
                    const dc = unc.map(a => ({target:a,allowFailure:true,callData:new ethers.utils.Interface(['function decimals() view returns (uint8)']).encodeFunctionData('decimals')}));
                    const [sr, dr] = await Promise.all([multicall(p, sc), multicall(p, dc)]);
                    const sd = new ethers.utils.Interface(['function symbol() view returns (string)']), dd = new ethers.utils.Interface(['function decimals() view returns (uint8)']);
                    for(let i = 0; i < unc.length; i++) {
                        let sym = 'TOKEN', dec = 18;
                        if(sr[i].success) { try { sym = sd.decodeFunctionResult('symbol', sr[i].returnData)[0]; } catch(e) { markTokenInvalid(unc[i]); } }
                        if(dr[i].success) { try { dec = dd.decodeFunctionResult('decimals', dr[i].returnData)[0]; } catch(e) { markTokenInvalid(unc[i]); } }
                        rm[unc[i]] = { symbol: sym, decimals: dec };
                        setTokenInfo(unc[i], rm[unc[i]]);
                    }
                }
                return rm;
            }

            function updateCountDisplays(type) {
                const idMap = type === 'lock' ? {
                    all: 'allLockActiveCount', personal: 'personalLockActiveCount',
                    allCompleted: 'allLockCompletedCount', personalCompleted: 'personalLockCompletedCount'
                } : {
                    all: 'allActiveCount', personal: 'personalActiveCount',
                    allCompleted: 'allCompletedCount', personalCompleted: 'personalCompletedCount'
                };
                const store = dataStore[type];
                for (const [key, id] of Object.entries(idMap)) {
                    const span = document.querySelector(`[data-count-id="${id}"]`);
                    if (span) span.textContent = (store[key] || []).length;
                }
            }

            window.claimLock = async function(lockId) { if(isClaiming)return; if(!contract||!signer){showToast('请先连接钱包','error');return;} const btn=document.getElementById('btnLock'+lockId); if(btn){btn.classList.add('loading');btn.disabled=true;} isClaiming=true; try{const tx=await contract.withdrawLock(lockId);showToast('交易已提交，等待确认...','');await tx.wait();showToast(`锁仓 #${lockId} 领取成功！🎉`,'success');clearCache(); await loadAllData(true);}catch(err){let msg='领取失败';if(err.code===4001)msg='用户取消了交易';else if(err.message&&err.message.includes('Not beneficiary'))msg='您不是受益人';else if(err.message&&err.message.includes('Not unlock yet'))msg='尚未到解锁时间';else if(err.message&&err.message.includes('Already withdrawn'))msg='已被领取';else if(err.message)msg='领取失败: '+err.message;showToast(msg,'error');}finally{isClaiming=false;if(btn){btn.classList.remove('loading');btn.disabled=false;}updateAllCards();}};
            window.claimVest = async function(vestId) { if(isClaiming)return; if(!contract||!signer){showToast('请先连接钱包','error');return;} const btn=document.getElementById('btnVest'+vestId); if(btn){btn.disabled=true;btn.textContent='⏳ 处理中...';} isClaiming=true; try{const tx=await contract.withdrawVest(vestId);showToast('交易已提交，等待确认...','');await tx.wait();showToast(`线性释放 #${vestId} 领取成功！🎉`,'success');clearCache(); await loadAllData(true);}catch(err){let msg='领取失败';if(err.code===4001)msg='用户取消了交易';else if(err.message&&err.message.includes('Not beneficiary'))msg='您不是受益人';else if(err.message&&err.message.includes('Wait for next cycle'))msg='请等待下一个领取周期';else if(err.message&&err.message.includes('No token to claim'))msg='当前无可领取代币';else if(err.message&&err.message.includes('Cliff not over'))msg='悬崖期尚未结束';else if(err.message)msg='领取失败: '+err.message;showToast(msg,'error');}finally{isClaiming=false;if(btn){btn.disabled=false;btn.textContent='🔥 领取代币';}updateAllCards();}};

            if (window.ethereum) {
                window.ethereum.on('accountsChanged', (accounts) => { debouncedWalletAction(() => { if (accounts.length === 0) disconnectWallet(); else if (accounts[0] !== userAddress) setupWallet(accounts[0]); }); });
                window.ethereum.on('chainChanged', (newChainId) => { debouncedWalletAction(() => { if (parseInt(newChainId, 16) === CONFIG.CHAIN_ID && userAddress) setupWallet(userAddress); else disconnectWallet(); }); });
            }

            (async function autoInit() {
                try { const rp = await getProvider(); await loadTotalLocked(rp); } catch(e) { totalLockedEl.textContent = '--'; totalLockedSubEl.textContent = 'RPC连接较慢'; }
                if (window.ethereum) { try { const accs = await window.ethereum.request({ method: 'eth_accounts' }); if (accs.length > 0) await setupWallet(accs[0]); } catch (e) {} }
            })();
        });
    </script>
