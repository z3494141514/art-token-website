<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铁军招募计划 | 锁仓领取</title>
    <meta name="description" content="铁军招募计划 - 链上锁仓代币领取平台">
    <meta name="theme-color" content="#0d0d14">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <style>
        :root {
            --bg-deep: #0a0a10;
            --bg-card: #12121c;
            --bg-card-hover: #181828;
            --gold: #c9a050;
            --gold-light: #d4b860;
            --gold-dark: #a07828;
            --red: #9b1e1e;
            --red-light: #c0392b;
            --green-military: #2d5016;
            --green-light: #3d6a1e;
            --text: #e0ddd5;
            --text-dim: #8a8780;
            --text-bright: #f5f0e0;
            --border: #2a2830;
            --border-gold: rgba(201, 160, 80, 0.4);
            --shadow-gold: rgba(201, 160, 80, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --font-military: 'Georgia', 'Times New Roman', serif;
            --font-main: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            color: var(--text);
            font-family: var(--font-main);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(201, 160, 80, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 60%, rgba(155, 30, 30, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(45, 80, 22, 0.04) 0%, transparent 50%);
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.03;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 3px,
                    rgba(255,255,255,0.3) 3px,
                    rgba(255,255,255,0.3) 4px);
        }

        .container { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px;
        }
        .navbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text-bright); }
        .navbar-logo {
            width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #1a1a2e, #2a2030);
            border: 2px solid var(--gold-dark); display: flex; align-items: center; justify-content: center;
            font-size: 22px; box-shadow: 0 0 18px var(--shadow-gold); flex-shrink: 0;
        }
        .navbar-title { font-family: var(--font-military); font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; color: var(--gold); }
        .navbar-subtitle { font-size: 0.7rem; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }

        .btn-connect {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px;
            border-radius: 50px; font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: all 0.3s ease; border: 1px solid var(--border-gold);
            background: rgba(18,18,28,0.8); color: var(--gold); white-space: nowrap;
            position: relative; overflow: hidden;
        }
        .btn-connect:hover { background: rgba(201,160,80,0.1); border-color: var(--gold); box-shadow: 0 0 20px var(--shadow-gold); transform: translateY(-1px); }
        .btn-connect.connected { border-color: var(--green-light); color: #5cb85c; background: rgba(45,80,22,0.2); }
        .btn-connect .dot { width: 8px; height: 8px; border-radius: 50%; background: #c0392b; animation: dotPulse 2s ease-in-out infinite; }
        .btn-connect.connected .dot { background: #5cb85c; }
        @keyframes dotPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(92,184,92,0.6); } 50% { box-shadow: 0 0 0 10px rgba(92,184,92,0); } }

        .hero-section { text-align: center; padding: 40px 0 30px; }
        .hero-badge {
            display: inline-block; padding: 6px 18px; border-radius: 50px;
            border: 1px solid var(--border-gold); font-size: 0.8rem; letter-spacing: 3px;
            color: var(--gold); background: rgba(201,160,80,0.06); margin-bottom: 16px; text-transform: uppercase;
        }
        .hero-title {
            font-family: var(--font-military); font-size: clamp(2rem,5vw,3.2rem); font-weight: bold;
            letter-spacing: 4px; color: var(--text-bright); margin-bottom: 8px; text-shadow: 0 0 30px rgba(201,160,80,0.25);
        }
        .hero-title .accent { color: var(--gold); }
        .hero-desc { color: var(--text-dim); font-size: 0.95rem; max-width: 500px; margin: 0 auto 20px; letter-spacing: 1px; }

        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px 32px; display: inline-flex; flex-direction: column; align-items: center; gap: 6px;
            position: relative; overflow: hidden; transition: all 0.4s ease; min-width: 220px;
        }
        .stat-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--shadow-gold), transparent, transparent, transparent, var(--shadow-gold), transparent);
            animation: statRotate 8s linear infinite; opacity: 0.5; z-index: 0;
        }
        @keyframes statRotate { to { transform: rotate(360deg); } }
        .stat-card-inner {
            position: relative; z-index: 1; background: var(--bg-card); border-radius: var(--radius);
            padding: 24px 28px; text-align: center; width: 100%;
        }
        .stat-label { font-size: 0.8rem; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value {
            font-size: 2.2rem; font-weight: bold; color: var(--gold);
            font-family: var(--font-military); letter-spacing: 1px; word-break: break-all;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .stat-value.bump { transform: scale(1.05); opacity: 0.9; }
        .stat-sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
        .stat-num { color: var(--gold); font-size: 1.2rem; font-weight: 700; margin: 0 4px; transition: transform 0.2s; }
        .stat-refresh-btn {
            background: none; border: 1px solid var(--border-gold); color: var(--gold);
            border-radius: 50%; width: 28px; height: 28px; font-size: 1rem; cursor: pointer;
            margin-left: 8px; display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .stat-refresh-btn:hover { background: rgba(201,160,80,0.15); box-shadow: 0 0 12px var(--shadow-gold); }

        .section-title {
            font-family: var(--font-military); font-size: 1.4rem; letter-spacing: 3px; color: var(--text-bright);
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .view-toggle {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .view-toggle button {
            padding: 8px 18px; border-radius: 50px; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s ease; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-dim); letter-spacing: 1px;
        }
        .view-toggle button.active {
            border-color: var(--gold); color: var(--gold); background: rgba(201,160,80,0.1);
            box-shadow: 0 0 12px var(--shadow-gold);
        }
        .view-toggle button:hover { border-color: var(--gold); color: var(--gold); }

        .lock-grid { display: grid; gap: 16px; grid-template-columns: 1fr; }
        @media (min-width: 640px) { .lock-grid { grid-template-columns: repeat(2, 1fr); } }

        .lock-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px 24px; transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .lock-card:hover { border-color: var(--border-gold); box-shadow: 0 4px 24px var(--shadow-gold); transform: translateY(-2px); }
        .lock-card.claimed { opacity: 0.55; border-color: var(--border); }
        .lock-card.claimed:hover { border-color: var(--border); box-shadow: none; transform: none; }
        .lock-card.not-owner { border-color: rgba(192,57,43,0.3); }
        .lock-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .lock-id { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 2px; font-family: var(--font-military); }
        .lock-status { font-size: 0.75rem; padding: 4px 12px; border-radius: 50px; font-weight: 600; letter-spacing: 1px; }
        .status-ready { background: rgba(45,80,22,0.3); color: #5cb85c; border: 1px solid rgba(92,184,92,0.4); }
        .status-waiting { background: rgba(201,160,80,0.15); color: var(--gold); border: 1px solid var(--border-gold); }
        .status-claimed { background: rgba(138,135,128,0.15); color: var(--text-dim); border: 1px solid var(--border); }
        .status-cliff { background: rgba(192,57,43,0.25); color: #e74c3c; border: 1px solid rgba(231,76,60,0.4); }
        .status-releasable { background: rgba(45,80,22,0.3); color: #5cb85c; border: 1px solid rgba(92,184,92,0.4); }
        .lock-amount { font-size: 1.5rem; font-weight: bold; color: var(--text-bright); font-family: var(--font-military); }
        .lock-token { font-size: 0.85rem; color: var(--gold); font-weight: 500; }
        .lock-time { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }
        .lock-countdown { font-size: 1.1rem; font-weight: 600; color: var(--gold-light); letter-spacing: 1px; margin-top: 2px; font-variant-numeric: tabular-nums; }
        .btn-claim {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 28px; border-radius: 50px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease; border: none;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #1a1a10;
            letter-spacing: 2px; margin-top: 12px; width: 100%; justify-content: center;
            position: relative; overflow: hidden;
        }
        .btn-claim:hover:not(:disabled) { box-shadow: 0 0 28px rgba(201,160,80,0.5); transform: translateY(-2px); filter: brightness(1.1); }
        .btn-claim:disabled { background: #3a3a40; color: #6a6a6a; cursor: not-allowed; }
        .btn-claim.loading { pointer-events: none; opacity: 0.7; }
        .btn-claim .spinner { display: none; width: 18px; height: 18px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn-claim.loading .spinner { display: inline-block; }
        .btn-claim.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-claim-not-owner {
            font-size: 0.75rem; color: #e74c3c; text-align: center; margin-top: 8px;
            padding: 6px 12px; border: 1px dashed rgba(231,76,60,0.4); border-radius: 50px;
        }

        .vest-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; transition: all 0.3s ease; }
        .vest-card:hover { border-color: var(--border-gold); box-shadow: 0 4px 24px var(--shadow-gold); transform: translateY(-2px); }
        .vest-card.not-owner { border-color: rgba(192,57,43,0.3); }
        .vest-progress { width: 100%; height: 6px; background: #1a1a24; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .vest-progress-bar { height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); border-radius: 3px; transition: width 0.3s ease; }
        .vest-note { font-size: 0.7rem; color: var(--gold-light); margin-top: 2px; letter-spacing: 1px; }
        .btn-claim-vest {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 28px; border-radius: 50px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.3s ease;
            border: 1px solid var(--gold); background: transparent; color: var(--gold);
            letter-spacing: 2px; margin-top: 12px; width: 100%; justify-content: center;
            position: relative; overflow: hidden;
        }
        .btn-claim-vest:hover:not(:disabled) { background: rgba(201,160,80,0.15); box-shadow: 0 0 28px var(--shadow-gold); transform: translateY(-2px); }
        .btn-claim-vest:disabled { border-color: #3a3a40; color: #6a6a6a; cursor: not-allowed; background: transparent; }
        .btn-claim-vest.loading { pointer-events: none; opacity: 0.7; }
        .btn-claim-vest .spinner { display: none; width: 18px; height: 18px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; }
        .btn-claim-vest.loading .spinner { display: inline-block; }
        .btn-claim-vest.loading .btn-text { display: none; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast {
            background: var(--bg-card); border: 1px solid var(--border-gold); color: var(--text-bright);
            padding: 14px 22px; border-radius: var(--radius-sm); font-size: 0.9rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); pointer-events: auto; cursor: pointer;
            animation: toastIn 0.35s ease, toastOut 0.35s ease 2.5s forwards; max-width: 320px; letter-spacing: 1px;
        }
        .toast.success { border-color: rgba(92,184,92,0.5); background: rgba(45,80,22,0.5); }
        .toast.error { border-color: rgba(192,57,43,0.5); background: rgba(155,30,30,0.4); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(60px); } }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state p { letter-spacing: 2px; font-size: 0.9rem; }

        @media (max-width: 480px) {
            .navbar { flex-direction: column; align-items: flex-start; }
            .btn-connect { width: 100%; justify-content: center; }
            .stat-value { font-size: 1.8rem; }
            .hero-title { letter-spacing: 2px; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <nav class="navbar">
            <a href="#" class="navbar-brand">
                <div class="navbar-logo">🛡️</div>
                <div>
                    <div class="navbar-title">铁军招募</div>
                    <div class="navbar-subtitle">Iron Army · Lock & Claim</div>
                </div>
            </a>
            <button id="btnConnect" class="btn-connect" onclick="toggleWallet()">
                <span class="dot"></span>
                <span id="btnConnectText">连接钱包</span>
            </button>
        </nav>

        <section class="hero-section">
            <div class="hero-badge">⚔️ 铁军招募计划 ⚔️</div>
            <h1 class="hero-title">铁军<span class="accent">锁仓</span>领取</h1>
            <p class="hero-desc">链上智能合约锁定 · 到期自动释放 · 铁血纪律守护资产安全</p>
            <div class="stat-card" style="margin-top:16px;">
                <div class="stat-card-inner">
                    <div class="stat-label">📊 合约总锁仓 <button class="stat-refresh-btn" onclick="refreshTotalLocked()" title="刷新总锁仓">↻</button></div>
                    <div class="stat-value" id="totalLocked">--</div>
                    <div class="stat-sub" id="totalLockedSub">加载中...</div>
                </div>
            </div>
        </section>

        <section style="padding: 10px 0 30px;">
            <div class="section-title">🔒 一次性锁仓</div>
            <div id="lockList" class="lock-grid">
                <div class="empty-state"><div class="icon">🔗</div><p>请连接钱包查看您的锁仓记录</p></div>
            </div>
        </section>

        <section style="padding: 10px 0 40px;">
            <div class="section-title">📅 线性锁仓释放</div>
            <div class="view-toggle">
                <button id="btnViewAll" class="active" onclick="switchVestView('all')">🌐 全网锁仓 (<span id="allVestCount">0</span>)</button>
                <button id="btnViewPersonal" onclick="switchVestView('personal')">👤 个人锁仓 (<span id="personalVestCount">0</span>)</button>
            </div>
            <div id="vestList" class="lock-grid">
                <div class="empty-state"><div class="icon">⏳</div><p>请连接钱包查看线性释放记录</p></div>
            </div>
        </section>

        <footer style="text-align:center;padding:24px 0;border-top:1px solid var(--border);color:var(--text-dim);font-size:0.75rem;letter-spacing:2px;">
            © 2026 铁军招募计划 · Powered by Smart Contract · BSC Testnet
        </footer>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            const CONTRACT_ADDRESS = '0x3d4F23636A149930EAa69a4ACaba50fd8E1Eb1Ed';
            const CHAIN_ID = 97;
            const CHAIN_ID_HEX = '0x61';
            const RPC_URLS = [
                'https://bsc-testnet-rpc.publicnode.com',
                'https://bsc-testnet.binance.org/',
            ];
            const MULTICALL_ADDRESS = '0xca11bde05977b3631167028862be2a173976ca11';
            const MULTICALL_ABI = [
                "function aggregate3(tuple(address target, bool allowFailure, bytes callData)[] calls) view returns (tuple(bool success, bytes returnData)[])",
            ];
            const CONTRACT_ABI = [
                "function lockCount() view returns (uint256)",
                "function vestCount() view returns (uint256)",
                "function tokenLocks(uint256) view returns (address token, address beneficiary, uint256 amount, uint256 unlockTime, bool withdrawn)",
                "function tokenVests(uint256) view returns (address token, address beneficiary, uint256 totalAmount, uint256 cliffTime, uint256 endTime, uint256 releaseInterval, uint256 lastClaimTime, uint256 released)",
                "function withdrawLock(uint256 lockId) external",
                "function withdrawVest(uint256 vestId) external",
            ];

            let provider = null, signer = null, contract = null, userAddress = null;
            let lockStore = [], vestStore = [], allVestStore = [];
            let currentVestView = 'all';
            let timerInterval = null;
            let isTimerRunning = false;
            let totalRefreshCounter = 0;
            const TOTAL_REFRESH_INTERVAL = 15;
            let isClaiming = false;

            const $ = id => document.getElementById(id);
            const totalLockedEl = $('totalLocked'), totalLockedSubEl = $('totalLockedSub');
            const lockListEl = $('lockList'), vestListEl = $('vestList');
            const btnConnect = $('btnConnect'), btnConnectText = $('btnConnectText');
            const toastContainer = $('toastContainer');
            const btnViewAll = $('btnViewAll'), btnViewPersonal = $('btnViewPersonal');
            const allVestCountEl = $('allVestCount'), personalVestCountEl = $('personalVestCount');

            function animateNumberUpdate(element, newText) {
                element.classList.add('bump');
                setTimeout(() => element.classList.remove('bump'), 300);
                element.textContent = newText;
            }

            function formatDateTime(timestamp) {
                const d = new Date(timestamp * 1000);
                const pad = (n) => String(n).padStart(2, '0');
                return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
            }

            function formatCountdown(seconds) {
                if (seconds <= 0) return '剩余 00:00:00';
                const d = Math.floor(seconds / 86400);
                const h = Math.floor((seconds % 86400) / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = seconds % 60;
                const pad = (n) => String(n).padStart(2, '0');
                let str = '';
                if (d > 0) str += `${d}天 `;
                str += `${pad(h)}:${pad(m)}:${pad(s)}`;
                return `剩余 ${str}`;
            }

            function getCachedTokenInfo(addr) {
                try { const raw = localStorage.getItem('tokenCache_' + addr.toLowerCase()); if (raw) return JSON.parse(raw); } catch (e) {}
                return null;
            }
            function setCachedTokenInfo(addr, info) {
                try { localStorage.setItem('tokenCache_' + addr.toLowerCase(), JSON.stringify(info)); } catch (e) {}
            }

            function showToast(msg, type = '') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = msg;
                toast.addEventListener('click', () => toast.remove());
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
                toastContainer.appendChild(toast);
            }

            window.toggleWallet = () => userAddress ? disconnectWallet() : connectWallet(true);

            async function connectWallet(isManual = false) {
                if (!window.ethereum) { if (isManual) showToast('请安装 MetaMask 或使用 TP 钱包打开','error'); return; }
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    await setupWallet(accounts[0]);
                    if (isManual) showToast('钱包连接成功！🛡️','success');
                } catch (err) {
                    if (isManual) showToast(err.code === 4001 ? '用户拒绝了连接请求' : '连接失败','error');
                }
            }

            async function setupWallet(account) {
                userAddress = account;
                const chainId = parseInt(await window.ethereum.request({ method: 'eth_chainId' }), 16);
                if (chainId !== CHAIN_ID) {
                    showToast('请切换到 BSC 测试网 (Chain 97)','error');
                    try { await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_ID_HEX }] }); }
                    catch (e) { showToast('切换网络失败','error'); return; }
                }
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                updateWalletUI();
                await loadAllData();
                startTimer();
            }

            function disconnectWallet() {
                userAddress = null; signer = null; contract = null; provider = null;
                updateWalletUI();
                clearTimer();
                lockStore = []; vestStore = []; allVestStore = [];
                lockListEl.innerHTML = `<div class="empty-state"><div class="icon">🔗</div><p>请连接钱包查看您的锁仓记录</p></div>`;
                vestListEl.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><p>请连接钱包查看线性释放记录</p></div>`;
                totalLockedEl.textContent = '--'; totalLockedSubEl.textContent = '请连接钱包';
                allVestCountEl.textContent = '0'; personalVestCountEl.textContent = '0';
            }

            function updateWalletUI() {
                if (userAddress) {
                    btnConnect.classList.add('connected');
                    btnConnectText.textContent = userAddress.substring(0,6) + '...' + userAddress.substring(userAddress.length-4);
                } else {
                    btnConnect.classList.remove('connected');
                    btnConnectText.textContent = '连接钱包';
                }
            }

            function clearTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } isTimerRunning = false; }
            function startTimer() { if (isTimerRunning) return; clearTimer(); timerInterval = setInterval(updateAllCards, 1000); isTimerRunning = true; }

            window.switchVestView = function(view) {
                currentVestView = view;
                btnViewAll.classList.toggle('active', view === 'all');
                btnViewPersonal.classList.toggle('active', view === 'personal');
                renderVestCards();
                updateAllCards();
            };

            window.refreshTotalLocked = async function() {
                if (!userAddress && !provider) {
                    const rpcProvider = new ethers.providers.JsonRpcProvider(RPC_URLS[0]);
                    try { await loadTotalLocked(rpcProvider); } catch (e) { totalLockedEl.textContent = '加载失败'; totalLockedSubEl.textContent = '请稍后重试'; }
                } else {
                    await refreshTotalLocked();
                }
            };

            async function refreshTotalLocked() {
                if (!userAddress) return;
                const rpcProvider = new ethers.providers.JsonRpcProvider(RPC_URLS[0]);
                try { await loadTotalLocked(rpcProvider); } catch (e) {
                    console.warn('刷新总锁仓失败', e);
                    try { await loadTotalLocked(new ethers.providers.JsonRpcProvider(RPC_URLS[1])); } catch (e2) {}
                }
            }

            function updateAllCards() {
                const now = Math.floor(Date.now() / 1000);
                totalRefreshCounter++;
                if (totalRefreshCounter >= TOTAL_REFRESH_INTERVAL) { totalRefreshCounter = 0; refreshTotalLocked(); }

                lockStore.forEach(lock => {
                    const card = document.querySelector(`.lock-card[data-lock-id="${lock.id}"]`);
                    if (!card || lock.withdrawn) return;
                    const remaining = lock.unlockTime - now;
                    const statusEl = card.querySelector('.lock-status');
                    const countdownEl = card.querySelector('.lock-countdown');
                    const btnEl = card.querySelector('.btn-claim');
                    if (remaining <= 0) {
                        if (statusEl) { statusEl.className = 'lock-status status-ready'; statusEl.textContent = '⚡ 可领取'; }
                        if (countdownEl) countdownEl.textContent = '';
                        if (btnEl && !isClaiming) {
                            btnEl.disabled = false;
                            btnEl.innerHTML = '<span class="spinner"></span><span class="btn-text">🔥 立即领取</span>';
                            btnEl.onclick = () => claimLock(lock.id);
                        }
                    } else {
                        const days = Math.floor(remaining / 86400);
                        const hours = Math.floor((remaining % 86400) / 3600);
                        const minutes = Math.floor((remaining % 3600) / 60);
                        const seconds = remaining % 60;
                        let str = '';
                        if (days > 0) str += `${days}天 `;
                        str += `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
                        if (countdownEl) countdownEl.textContent = str;
                        if (statusEl) { statusEl.className = 'lock-status status-waiting'; statusEl.textContent = '⏳ 等待解锁'; }
                        if (btnEl) btnEl.disabled = true;
                    }
                });

                // 根据当前视图更新 vest 卡片
                const source = currentVestView === 'all' ? allVestStore : vestStore;
                source.forEach(vest => {
                    const card = document.querySelector(`.vest-card[data-vest-id="${vest.id}"]`);
                    if (!card) return;
                    const progressBar = card.querySelector('.vest-progress-bar');
                    const progressText = card.querySelector('.vest-progress-text');
                    const statusEl = card.querySelector('.lock-status');
                    const btnEl = card.querySelector('.btn-claim-vest');
                    const notOwnerEl = card.querySelector('.btn-claim-not-owner');
                    const availableEl = card.querySelector('.vest-available');

                    let progress = 0;
                    let isCliff = now < vest.cliffTime;
                    if (now >= vest.cliffTime) {
                        const totalPeriod = vest.endTime - vest.cliffTime;
                        const runTime = Math.min(now - vest.cliffTime, totalPeriod);
                        progress = totalPeriod > 0 ? (runTime / totalPeriod) * 100 : 100;
                    }
                    progress = Math.min(100, Math.max(0, progress));
                    if (progressBar) progressBar.style.width = `${progress.toFixed(1)}%`;
                    if (progressText) progressText.textContent = `释放进度：${progress.toFixed(1)}%`;

                    const total = parseFloat(ethers.utils.formatUnits(vest.totalAmount, vest.decimals));
                    const released = parseFloat(ethers.utils.formatUnits(vest.released, vest.decimals));
                    let unlockable = 0;
                    if (now >= vest.cliffTime) {
                        const elapsed = now - vest.cliffTime;
                        const totalPeriod = vest.endTime - vest.cliffTime;
                        const vested = totalPeriod > 0 ? (total * elapsed) / totalPeriod : total;
                        unlockable = Math.max(0, vested - released);
                        if (unlockable > total - released) unlockable = total - released;
                    }
                    if (availableEl) {
                        availableEl.textContent = `可领取：${unlockable.toLocaleString('zh-CN', { maximumFractionDigits: 2 })} ${vest.symbol}`;
                    }

                    const isFullyReleased = vest.released.gte(vest.totalAmount);
                    const isOwner = vest.isOwner;

                    if (statusEl) {
                        if (isFullyReleased || progress >= 100) {
                            statusEl.className = 'lock-status status-ready';
                            statusEl.textContent = '✅ 已完全释放';
                        } else if (isCliff) {
                            statusEl.className = 'lock-status status-cliff';
                            statusEl.textContent = '🔒 悬崖期锁定中';
                        } else {
                            statusEl.className = 'lock-status status-waiting';
                            statusEl.textContent = '📈 释放中';
                        }
                    }

                    // 非本人锁仓：显示提示
                    if (!isOwner && currentVestView === 'all') {
                        if (btnEl) btnEl.style.display = 'none';
                        if (notOwnerEl) {
                            notOwnerEl.style.display = 'block';
                            notOwnerEl.textContent = '这不是您的锁仓无法领取哦！';
                        }
                    } else {
                        if (notOwnerEl) notOwnerEl.style.display = 'none';
                        if (btnEl) {
                            btnEl.style.display = 'flex';
                            const canClaim = !isCliff && !isFullyReleased && (now >= vest.endTime || vest.released.eq(0) || now >= vest.lastClaimTime + vest.releaseInterval);
                            if (isFullyReleased) {
                                btnEl.disabled = true;
                                btnEl.textContent = '✅ 已全部释放';
                            } else if (canClaim) {
                                btnEl.disabled = false;
                                btnEl.textContent = '🔥 领取代币';
                                btnEl.onclick = () => claimVest(vest.id);
                            } else if (isCliff) {
                                btnEl.disabled = true;
                                btnEl.textContent = `⏳ 释放倒计时 ${formatCountdown(vest.cliffTime - now)}`;
                            } else {
                                btnEl.disabled = true;
                                btnEl.textContent = `⏳ 下次可领：${formatDateTime(vest.lastClaimTime + vest.releaseInterval)}`;
                            }
                        }
                    }
                });
            }

            async function multicall(provider, calls) { const mc = new ethers.Contract(MULTICALL_ADDRESS, MULTICALL_ABI, provider); return await mc.aggregate3(calls); }
            function buildCalls(contractAddr, abi, method, paramsList) { const iface = new ethers.utils.Interface(abi); return paramsList.map(params => ({ target: contractAddr, allowFailure: true, callData: iface.encodeFunctionData(method, params) })); }
            function decodeResults(results, abi, method) { const iface = new ethers.utils.Interface(abi); return results.map(r => r.success ? iface.decodeFunctionResult(method, r.returnData) : null); }

            async function loadAllData() {
                const rpc = new ethers.providers.JsonRpcProvider(RPC_URLS[0]);
                try { await Promise.all([loadTotalLocked(rpc), loadLocks(rpc), loadVests(rpc)]); }
                catch (e) { const backup = new ethers.providers.JsonRpcProvider(RPC_URLS[1]); await Promise.all([loadTotalLocked(backup), loadLocks(backup), loadVests(backup)]); }
            }

            async function fetchTokenInfos(provider, tokenAddresses) {
                const uncached = []; const resultMap = {};
                for (const addr of tokenAddresses) { const cached = getCachedTokenInfo(addr); if (cached) { resultMap[addr] = cached; } else { uncached.push(addr); } }
                if (uncached.length > 0) {
                    const symCalls = uncached.map(a => ({ target: a, allowFailure: true, callData: new ethers.utils.Interface(['function symbol() view returns (string)']).encodeFunctionData('symbol') }));
                    const decCalls = uncached.map(a => ({ target: a, allowFailure: true, callData: new ethers.utils.Interface(['function decimals() view returns (uint8)']).encodeFunctionData('decimals') }));
                    const [symRes, decRes] = await Promise.all([multicall(provider, symCalls), multicall(provider, decCalls)]);
                    const symDecoder = new ethers.utils.Interface(['function symbol() view returns (string)']);
                    const decDecoder = new ethers.utils.Interface(['function decimals() view returns (uint8)']);
                    for (let i = 0; i < uncached.length; i++) {
                        let symbol = 'TOKEN', decimals = 18;
                        if (symRes[i].success) try { symbol = symDecoder.decodeFunctionResult('symbol', symRes[i].returnData)[0]; } catch (e) {}
                        if (decRes[i].success) try { decimals = decDecoder.decodeFunctionResult('decimals', decRes[i].returnData)[0]; } catch (e) {}
                        const info = { symbol, decimals };
                        resultMap[uncached[i]] = info; setCachedTokenInfo(uncached[i], info);
                    }
                }
                return resultMap;
            }

            async function loadTotalLocked(provider) {
                try {
                    const lockContract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);
                    const [lc, vc] = await Promise.all([lockContract.lockCount(), lockContract.vestCount()]);
                    const totalLockCount = lc.toNumber(), totalVestCount = vc.toNumber();
                    if (totalLockCount + totalVestCount === 0) { animateNumberUpdate(totalLockedEl, '0'); totalLockedSubEl.innerHTML = `一次性锁仓 <span class="stat-num">0</span> 笔 · 线性锁仓释放 <span class="stat-num">0</span> 笔`; return; }
                    const lockCalls = buildCalls(CONTRACT_ADDRESS, CONTRACT_ABI, 'tokenLocks', Array.from({length: totalLockCount}, (_,i) => [i+1]));
                    const vestCalls = buildCalls(CONTRACT_ADDRESS, CONTRACT_ABI, 'tokenVests', Array.from({length: totalVestCount}, (_,i) => [i+1]));
                    const [lockRes, vestRes] = await Promise.all([multicall(provider, lockCalls), multicall(provider, vestCalls)]);
                    const locks = decodeResults(lockRes, CONTRACT_ABI, 'tokenLocks');
                    const vests = decodeResults(vestRes, CONTRACT_ABI, 'tokenVests');
                    const tokenAmounts = {}; let activeLockCount = 0, activeVestCount = 0; const involvedTokens = new Set();
                    locks.forEach(l => { if (l && !l.withdrawn) { activeLockCount++; const a = l.token.toLowerCase(); involvedTokens.add(a); if (!tokenAmounts[a]) tokenAmounts[a] = ethers.BigNumber.from(0); tokenAmounts[a] = tokenAmounts[a].add(l.amount); } });
                    vests.forEach(v => { if (v && v.released.lt(v.totalAmount)) { activeVestCount++; const remaining = v.totalAmount.sub(v.released); const a = v.token.toLowerCase(); involvedTokens.add(a); if (!tokenAmounts[a]) tokenAmounts[a] = ethers.BigNumber.from(0); tokenAmounts[a] = tokenAmounts[a].add(remaining); } });
                    const tokenInfoMap = await fetchTokenInfos(provider, Array.from(involvedTokens));
                    const parts = [];
                    for (const [addr, amount] of Object.entries(tokenAmounts)) { if (amount.gt(0)) { const info = tokenInfoMap[addr] || { symbol: 'TOKEN', decimals: 18 }; const num = parseFloat(ethers.utils.formatUnits(amount, info.decimals)); if (num > 0) parts.push(num.toLocaleString('zh-CN', { maximumFractionDigits: 2 })); } }
                    animateNumberUpdate(totalLockedEl, parts.length ? parts.join(' + ') : '0');
                    totalLockedSubEl.innerHTML = `一次性锁仓 <span class="stat-num">${activeLockCount}</span> 笔 · 线性锁仓释放 <span class="stat-num">${activeVestCount}</span> 笔`;
                } catch (e) { totalLockedEl.textContent = '加载失败'; totalLockedSubEl.textContent = '点击刷新重试'; }
            }

            async function loadLocks(provider) {
                try {
                    const lockContract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);
                    const lockCount = (await lockContract.lockCount()).toNumber();
                    if (lockCount === 0) { lockListEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>暂无一次性锁仓记录</p></div>`; return; }
                    const calls = buildCalls(CONTRACT_ADDRESS, CONTRACT_ABI, 'tokenLocks', Array.from({length: lockCount}, (_,i) => [i+1]));
                    const results = await multicall(provider, calls);
                    const locks = decodeResults(results, CONTRACT_ABI, 'tokenLocks');
                    lockStore = []; const tokenAddrs = new Set();
                    locks.forEach((lock, idx) => { if (!lock || !lock.beneficiary || lock.beneficiary === ethers.constants.AddressZero) return; if (lock.beneficiary.toLowerCase() !== userAddress.toLowerCase()) return; tokenAddrs.add(lock.token.toLowerCase()); lockStore.push({ id: idx+1, token: lock.token, amount: lock.amount, unlockTime: lock.unlockTime.toNumber(), withdrawn: lock.withdrawn }); });
                    const tokenInfoMap = await fetchTokenInfos(provider, Array.from(tokenAddrs));
                    lockStore.forEach(l => { const info = tokenInfoMap[l.token.toLowerCase()] || {symbol:'TOKEN',decimals:18}; l.symbol=info.symbol; l.decimals=info.decimals; });
                    lockStore.sort((a,b)=>a.id-b.id);
                    if (!lockStore.length) { lockListEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>您暂无锁仓记录</p></div>`; return; }
                    renderLockCards(); updateAllCards();
                } catch (e) { lockListEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>加载失败，请刷新重试</p></div>`; }
            }

            function renderLockCards() {
                const now = Math.floor(Date.now()/1000);
                lockListEl.innerHTML = lockStore.map(lock => {
                    const formatted = ethers.utils.formatUnits(lock.amount, lock.decimals);
                    const displayAmount = parseFloat(formatted).toLocaleString('zh-CN', { maximumFractionDigits: 2 });
                    const isClaimed = lock.withdrawn;
                    const unlockDate = formatDateTime(lock.unlockTime);
                    let statusHTML = isClaimed ? '<span class="lock-status status-claimed">✅ 已领取</span>' : (now >= lock.unlockTime ? '<span class="lock-status status-ready">⚡ 可领取</span>' : '<span class="lock-status status-waiting">⏳ 等待解锁</span>');
                    let btnHTML = isClaimed ? '<button class="btn-claim" disabled>已领取</button>' : (now >= lock.unlockTime ? `<button class="btn-claim" onclick="claimLock(${lock.id})" id="btnLock${lock.id}"><span class="spinner"></span><span class="btn-text">🔥 立即领取</span></button>` : `<button class="btn-claim" disabled>剩余 <span class="lock-countdown"></span></button>`);
                    return `<div class="lock-card ${isClaimed?'claimed':''}" data-lock-id="${lock.id}"><div class="lock-card-header"><span class="lock-id">#铁军-${String(lock.id).padStart(4,'0')}</span>${statusHTML}</div><div class="lock-amount">${displayAmount}</div><div class="lock-token">${lock.symbol}</div><div class="lock-time">📅 解锁时间：${unlockDate}</div><div class="lock-countdown"></div>${btnHTML}</div>`;
                }).join('');
            }

            async function loadVests(provider) {
                try {
                    const lockContract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);
                    const vestCount = (await lockContract.vestCount()).toNumber();
                    if (vestCount === 0) {
                        vestListEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>暂无线性释放记录</p></div>`;
                        allVestCountEl.textContent = '0'; personalVestCountEl.textContent = '0';
                        return;
                    }
                    const calls = buildCalls(CONTRACT_ADDRESS, CONTRACT_ABI, 'tokenVests', Array.from({length: vestCount}, (_,i) => [i+1]));
                    const results = await multicall(provider, calls);
                    const vests = decodeResults(results, CONTRACT_ABI, 'tokenVests');

                    allVestStore = []; vestStore = [];
                    const tokenAddrs = new Set();
                    const personalTokenAddrs = new Set();

                    vests.forEach((vest, idx) => {
                        if (!vest || !vest.beneficiary || vest.beneficiary === ethers.constants.AddressZero) return;
                        const isOwner = userAddress && vest.beneficiary.toLowerCase() === userAddress.toLowerCase();
                        const vestData = {
                            id: idx + 1,
                            token: vest.token,
                            totalAmount: vest.totalAmount,
                            cliffTime: vest.cliffTime.toNumber(),
                            endTime: vest.endTime.toNumber(),
                            releaseInterval: vest.releaseInterval.toNumber(),
                            lastClaimTime: vest.lastClaimTime.toNumber(),
                            released: vest.released,
                            isOwner: isOwner
                        };
                        allVestStore.push(vestData);
                        tokenAddrs.add(vest.token.toLowerCase());
                        if (isOwner) {
                            vestStore.push(vestData);
                            personalTokenAddrs.add(vest.token.toLowerCase());
                        }
                    });

                    // 获取全网代币信息
                    const tokenInfoMap = await fetchTokenInfos(provider, Array.from(tokenAddrs));
                    allVestStore.forEach(v => { const info = tokenInfoMap[v.token.toLowerCase()] || {symbol:'TOKEN',decimals:18}; v.symbol = info.symbol; v.decimals = info.decimals; });
                    vestStore.forEach(v => { const info = tokenInfoMap[v.token.toLowerCase()] || {symbol:'TOKEN',decimals:18}; v.symbol = info.symbol; v.decimals = info.decimals; });

                    allVestStore.sort((a,b) => a.id - b.id);
                    vestStore.sort((a,b) => a.id - b.id);

                    allVestCountEl.textContent = allVestStore.length;
                    personalVestCountEl.textContent = vestStore.length;

                    renderVestCards();
                    updateAllCards();
                } catch (e) { vestListEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>加载失败，请刷新重试</p></div>`; }
            }

            function renderVestCards() {
                const now = Math.floor(Date.now() / 1000);
                const source = currentVestView === 'all' ? allVestStore : vestStore;

                if (source.length === 0) {
                    vestListEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>暂无线性释放记录</p></div>`;
                    return;
                }

                vestListEl.innerHTML = source.map(vest => {
                    const total = parseFloat(ethers.utils.formatUnits(vest.totalAmount, vest.decimals));
                    const released = parseFloat(ethers.utils.formatUnits(vest.released, vest.decimals));
                    let progress = 0; let isCliff = now < vest.cliffTime;
                    if (now >= vest.cliffTime) { const totalPeriod = vest.endTime - vest.cliffTime; const runTime = Math.min(now - vest.cliffTime, totalPeriod); progress = totalPeriod>0 ? (runTime/totalPeriod)*100 : 100; }
                    progress = Math.min(100, Math.max(0, progress));
                    const isFullyReleased = vest.released.gte(vest.totalAmount);
                    const isOwner = vest.isOwner;
                    let unlockable = 0;
                    if (now >= vest.cliffTime) { const elapsed = now - vest.cliffTime; const totalPeriod = vest.endTime - vest.cliffTime; const vested = totalPeriod>0 ? (total * elapsed) / totalPeriod : total; unlockable = Math.max(0, vested - released); if (unlockable > total - released) unlockable = total - released; }
                    const cliffRemaining = vest.cliffTime - now;
                    let statusText = '', statusClass = '';
                    if (isFullyReleased || progress >= 100) { statusText = '✅ 已完全释放'; statusClass = 'status-ready'; }
                    else if (isCliff) { statusText = '🔒 悬崖期锁定中'; statusClass = 'status-cliff'; }
                    else { statusText = '📈 释放中'; statusClass = 'status-waiting'; }
                    let btnHTML = '';
                    let notOwnerHTML = '';
                    if (!isOwner && currentVestView === 'all') {
                        notOwnerHTML = '<div class="btn-claim-not-owner">这不是您的锁仓无法领取哦！</div>';
                    } else {
                        btnHTML = `<button class="btn-claim-vest" id="btnVest${vest.id}" disabled>⏳ ...</button>`;
                    }
                    return `<div class="vest-card ${!isOwner && currentVestView === 'all' ? 'not-owner' : ''}" data-vest-id="${vest.id}">
                        <div class="lock-card-header">
                            <span class="lock-id">#铁军-${String(vest.id).padStart(4,'0')}</span>
                            <span class="lock-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="lock-amount" style="font-size:1.3rem;">${total.toLocaleString('zh-CN',{maximumFractionDigits:2})} <span class="lock-token">${vest.symbol}</span></div>
                        <div style="font-size:0.8rem;color:var(--text-dim);">已领取：${released.toLocaleString('zh-CN',{maximumFractionDigits:2})} ${vest.symbol}</div>
                        <div class="vest-progress"><div class="vest-progress-bar" style="width:${progress.toFixed(1)}%;"></div></div>
                        <div class="vest-progress-text" style="font-size:0.7rem;color:var(--text-dim);">释放进度：${progress.toFixed(1)}%</div>
                        <div class="vest-available" style="font-size:0.8rem;color:var(--gold-light);margin-top:2px;">可领取：${unlockable.toLocaleString('zh-CN',{maximumFractionDigits:2})} ${vest.symbol}</div>
                        <div class="vest-note">过悬崖期后可线性释放！</div>
                        <div class="lock-time">📅 悬崖期结束：${formatDateTime(vest.cliffTime)}</div>
                        <div class="lock-time">📅 预计释放完成日期：${formatDateTime(vest.endTime)}</div>
                        ${btnHTML}
                        ${notOwnerHTML}
                    </div>`;
                }).join('');
                updateAllCards();
            }

            window.claimLock = async function(lockId) {
                if (isClaiming) return;
                if (!contract || !signer) { showToast('请先连接钱包','error'); return; }
                const btn = document.getElementById('btnLock'+lockId);
                if (btn) { btn.classList.add('loading'); btn.disabled = true; }
                isClaiming = true;
                try {
                    const tx = await contract.withdrawLock(lockId);
                    showToast('交易已提交，等待确认...','');
                    await tx.wait();
                    showToast(`锁仓 #${lockId} 领取成功！🎉`,'success');
                    await loadAllData();
                } catch (err) {
                    let msg = '领取失败';
                    if (err.code === 4001) msg = '用户取消了交易';
                    else if (err.message && err.message.includes('Not beneficiary')) msg = '您不是受益人';
                    else if (err.message && err.message.includes('Not unlock yet')) msg = '尚未到解锁时间';
                    else if (err.message && err.message.includes('Already withdrawn')) msg = '已被领取';
                    else if (err.message) msg = '领取失败: ' + err.message;
                    showToast(msg,'error');
                } finally {
                    isClaiming = false;
                    if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
                    updateAllCards();
                }
            };

            window.claimVest = async function(vestId) {
                if (isClaiming) return;
                if (!contract || !signer) { showToast('请先连接钱包','error'); return; }
                const btn = document.getElementById('btnVest'+vestId);
                if (btn) { btn.disabled = true; btn.textContent = '⏳ 处理中...'; }
                isClaiming = true;
                try {
                    const tx = await contract.withdrawVest(vestId);
                    showToast('交易已提交，等待确认...','');
                    await tx.wait();
                    showToast(`线性释放 #${vestId} 领取成功！🎉`,'success');
                    await loadAllData();
                } catch (err) {
                    let msg = '领取失败';
                    if (err.code === 4001) msg = '用户取消了交易';
                    else if (err.message && err.message.includes('Not beneficiary')) msg = '您不是受益人';
                    else if (err.message && err.message.includes('Wait for next cycle')) msg = '请等待下一个领取周期';
                    else if (err.message && err.message.includes('No token to claim')) msg = '当前无可领取代币';
                    else if (err.message && err.message.includes('Cliff not over')) msg = '悬崖期尚未结束';
                    else if (err.message) msg = '领取失败: ' + err.message;
                    showToast(msg,'error');
                } finally {
                    isClaiming = false;
                    if (btn) { btn.disabled = false; btn.textContent = '🔥 领取代币'; }
                    updateAllCards();
                }
            };

            (async function autoInit() {
                try {
                    const rpc = new ethers.providers.JsonRpcProvider(RPC_URLS[0]);
                    await loadTotalLocked(rpc);
                } catch (e) { totalLockedEl.textContent = '--'; totalLockedSubEl.textContent = 'RPC连接较慢'; }
                if (window.ethereum) {
                    try {
                        const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                        if (accounts.length > 0) await setupWallet(accounts[0]);
                    } catch (e) {}
                }
            })();
        });
    </script>
</body>
</html>
