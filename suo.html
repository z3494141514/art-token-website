                    return String(str).replace(/[&<>"'/]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','/':'&#47;' }[m]));
                }
                function formatAddress(addr) { return addr ? addr.substring(0, 6) + '...' + addr.substring(addr.length - 4) : ''; }
                function animateNumberUpdate(el, t) { el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 300); el.textContent = t; }
                function formatDateTime(t) { const d = new Date(t*1000), p = n => String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
                function formatCountdown(s) { if(s<=0)return'剩余 00:00:00'; const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60),ss=s%60,p=n=>String(n).padStart(2,'0'); let r=''; if(d>0)r+=`${d}天 `; r+=`${p(h)}:${p(m)}:${p(ss)}`; return`剩余 ${r}`; }
                function safeFormatUnits(bn, decimals = 18) {
                    try { if (!bn || !ethers.BigNumber.isBigNumber(bn) || bn.isZero()) return 0; return parseFloat(ethers.utils.formatUnits(bn, decimals)); }
                    catch(e) { return 0; }
                }
                function showToast(m, type='', txHash='') {

                // ========== 网络层（含超时 & 多轮重试） ==========
                async function multicallWithTimeout(provider, calls, timeout = MULTICALL_TIMEOUT) {
                    const mc = new ethers.Contract(MULTICALL, MULTICALL_ABI, provider);
                    return Promise.race([mc.aggregate3(calls), new Promise((_, reject) => setTimeout(() => reject(new Error('multicall timeout')), timeout))]);
                }
                async function multicall(p, c) { return await multicallWithTimeout(p, c); }
                async function multicallWithPagination(provider, allCalls) {
                    if (allCalls.length <= MULTICALL_BATCH_SIZE) return await multicall(provider, allCalls);
                    let results = [], currentProvider = provider;
                    for (let i = 0; i < allCalls.length; i += MULTICALL_BATCH_SIZE) {
                        const batch = allCalls.slice(i, i + MULTICALL_BATCH_SIZE);
                        let batchRes = null;
                        for (let r = 0; r < MULTICALL_RETRY; r++) {
                            try {
                                batchRes = await multicall(currentProvider, batch);
                                break;
                            } catch(e) {
                                const idx = (RPC_URLS.indexOf(currentProvider.connection?.url || '') + 1) % RPC_URLS.length;
                                currentProvider = new ethers.providers.JsonRpcProvider(RPC_URLS[idx]);
                            }
                        }
                        if (batchRes) results = results.concat(batchRes);
                    }
                    return results;
                }
                function buildCalls(ca,abi,m,pl){ const iface = new ethers.utils.Interface(abi); return pl.map(ps=>({target:ca,allowFailure:true,callData:iface.encodeFunctionData(m,ps)})); }
                function decodeResults(r,abi,m){ const iface = new ethers.utils.Interface(abi); return r.map(rr=>rr.success?iface.decodeFunctionResult(m,rr.returnData):null); }
                async function getFastestProvider() {
                    return new Promise((resolve, reject) => {
                        let settled = false; const providers = [];
                        RPC_URLS.forEach(url => {
                            const p = new ethers.providers.JsonRpcProvider(url); providers.push(p);
                            const timeout = setTimeout(() => { if(!settled){ settled=true; resolve(p); } }, 5000);
                            p.getNetwork().then(() => { clearTimeout(timeout); if(!settled){ settled=true; providers.forEach(pr=>{ if(pr!==p&&pr._events)pr._events={}; }); resolve(p); } }).catch(() => clearTimeout(timeout));
                        });
                        setTimeout(() => { if(!settled) reject(new Error('所有 RPC 节点不可用')); }, 5000);
                    });
                }

                // ========== 定时器 ==========
                function clearTimer() { if(animationId){ cancelAnimationFrame(animationId); animationId=null; } timerGuard=false; }

                function updateAllCards() {

                // ========== 卡片实时更新（仅修改 DOM 属性，不重建） ==========
                function updateLockCards(now) {
                    const view=dataStore.currentView.lock, source=dataStore.lock[view]||[], isCompletedView=view.includes('Completed');
                    source.forEach(lock => {
                        const els=lock._els; if(!els||!document.contains(els.card)) return;
                        if(isCompletedView||lock.withdrawn){
                            if(els.btn){ els.btn.style.display='flex'; els.btn.disabled=true; els.btn.textContent='已领取'; }
                            if(els.notOwner) els.notOwner.style.display='none';
                            if(els.status){ els.status.className='lock-status status-claimed'; els.status.textContent='✅ 已领取'; }
                            if(els.countdown) els.countdown.textContent='';
                        } else if(!lock.isOwner && view==='all') {
                            if(els.btn) els.btn.style.display='none';

                            if(lock.unlockTime<=now){ if(els.status){ els.status.className='lock-status status-ready'; els.status.textContent='⚡ 可领取'; } if(els.countdown) els.countdown.textContent=''; }
                            else { updateCountdown(lock.unlockTime-now, els.status, els.countdown); if(els.btn) els.btn.disabled=true; }
                        } else {
                            if(els.notOwner) els.notOwner.style.display='none';
                            if(lock.unlockTime<=now){
                                if(els.status){ els.status.className='lock-status status-ready'; els.status.textContent='⚡ 可领取'; }
                                if(els.countdown) els.countdown.textContent='';
                                if(els.btn&&!claimLockStatus[lock.id]){ els.btn.style.display='flex'; els.btn.disabled=false; els.btn.innerHTML='<span class="spinner"></span><span class="btn-text">🔥 立即领取</span>'; }
                            } else { updateCountdown(lock.unlockTime-now, els.status, els.countdown); if(els.btn){ els.btn.style.display='flex'; els.btn.disabled=true; } }
                        }
                    });
                }
                function updateVestCards(now) {
                    const view=dataStore.currentView.vest, source=dataStore.vest[view]||[], isCompletedView=view.includes('Completed');
                    source.forEach(vest => {
                        const els=vest._els; if(!els||!document.contains(els.card)) return;
                        let progress=0, isCliff=now<vest.cliffTime;
                        if(now>=vest.cliffTime){ const tp=vest.endTime-vest.cliffTime, rt=Math.min(now-vest.cliffTime,tp); progress=tp>0?(rt/tp)*100:100; }
                        progress=Math.min(100,Math.max(0,progress));
                        if(els.progressBar) els.progressBar.style.width=progress.toFixed(1)+'%';
                        if(els.progressText) els.progressText.textContent=`释放进度：${progress.toFixed(1)}%`;
                        const total=safeFormatUnits(vest.totalAmount,vest.decimals), released=safeFormatUnits(vest.released,vest.decimals);
                        let unlockable=0;
                        if(now>=vest.cliffTime){ const el=now-vest.cliffTime, tp=vest.endTime-vest.cliffTime, ve=tp>0?(total*el)/tp:total; unlockable=Math.max(0,ve-released); if(unlockable>total-released) unlockable=total-released; }
                        if(els.available) els.available.textContent=`可领取：${unlockable.toLocaleString('zh-CN',{maximumFractionDigits:2})} ${vest.symbol}`;
                        const isFullyReleased=vest.released.gte(vest.totalAmount), isOwner=vest.isOwner;
                        if(els.status){ if(isCompletedView||isFullyReleased||progress>=100){ els.status.className='lock-status status-ready'; els.status.textContent='✅ 已完全释放'; } else if(isCliff){ els.status.className='lock-status status-cliff'; els.status.textContent='🔒 悬崖期锁定中'; } else { els.status.className='lock-status status-waiting'; els.status.textContent='📈 释放中'; } }
                        if(isCompletedView||isFullyReleased){
                            if(els.btn){ els.btn.style.display='flex'; els.btn.disabled=true; els.btn.textContent='已全部释放'; }

                            else { if(els.btn) els.btn.style.display='none'; if(els.notOwner){ els.notOwner.style.display='block'; els.notOwner.textContent='这不是您的锁仓无法领取哦！'; } }
                        } else {
                            if(els.notOwner) els.notOwner.style.display='none';
                            if(els.btn){
                                els.btn.style.display='flex';
                                const canClaim=!isCliff&&!isFullyReleased&&(now>=vest.endTime||vest.released.eq(0)||now>=vest.lastClaimTime+vest.releaseInterval);
                                if(isFullyReleased){ els.btn.disabled=true; els.btn.textContent='✅ 已全部释放'; }
                                else if(canClaim){ els.btn.disabled=false; els.btn.textContent='🔥 领取代币'; }
                                else if(isCliff){ els.btn.disabled=true; els.btn.textContent=`⏳ 释放倒计时 ${formatCountdown(vest.cliffTime-now)}`; }
                                else { els.btn.disabled=true; els.btn.textContent=`⏳ 下次可领：${formatDateTime(vest.lastClaimTime+vest.releaseInterval)}`; }
                            }
                        }
                    });

                function updateCountdown(remaining, statusEl, countdownEl) {
                    const d=Math.floor(remaining/86400),h=Math.floor((remaining%86400)/3600),m=Math.floor((remaining%3600)/60),s=remaining%60;
                    let str=''; if(d>0) str+=`${d}天 `; str+=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    if(countdownEl) countdownEl.textContent=str;

                // ========== 数据加载 ==========
                async function loadAllData(){

                async function loadDataFromProvider(rp){
                    try {
                        const lc=new ethers.Contract(CONTRACT_ADDRESS,CONTRACT_ABI,rp);
                        const [lcB,vcB]=await Promise.all([lc.lockCount(),lc.vestCount()]);
                        const lockCount=lcB.toNumber(), vestCount=vcB.toNumber();
                        const lockCalls=buildCalls(CONTRACT_ADDRESS,CONTRACT_ABI,'tokenLocks',Array.from({length:lockCount},(_,i)=>[i]));
                        const vestCalls=buildCalls(CONTRACT_ADDRESS,CONTRACT_ABI,'tokenVests',Array.from({length:vestCount},(_,i)=>[i]));
                        const results=await multicallWithPagination(rp,[...lockCalls,...vestCalls]);
                        const locks=decodeResults(results.slice(0,lockCount),CONTRACT_ABI,'tokenLocks');
                        const vests=decodeResults(results.slice(lockCount),CONTRACT_ABI,'tokenVests');
                        await Promise.all([loadTotalLocked(rp), processLocks(locks,rp), processVests(vests,rp)]);
                    } catch(e){
                        const backup=new ethers.providers.JsonRpcProvider(RPC_URLS[1]);
                        const lc=new ethers.Contract(CONTRACT_ADDRESS,CONTRACT_ABI,backup);
                        const [lcB,vcB]=await Promise.all([lc.lockCount(),lc.vestCount()]);
                        const lockCount=lcB.toNumber(), vestCount=vcB.toNumber();
                        const lockCalls=buildCalls(CONTRACT_ADDRESS,CONTRACT_ABI,'tokenLocks',Array.from({length:lockCount},(_,i)=>[i]));
                        const vestCalls=buildCalls(CONTRACT_ADDRESS,CONTRACT_ABI,'tokenVests',Array.from({length:vestCount},(_,i)=>[i]));
                        const results=await multicallWithPagination(backup,[...lockCalls,...vestCalls]);
                        const locks=decodeResults(results.slice(0,lockCount),CONTRACT_ABI,'tokenLocks');
                        const vests=decodeResults(results.slice(lockCount),CONTRACT_ABI,'tokenVests');
                        await Promise.all([loadTotalLocked(backup), processLocks(locks,backup), processVests(vests,backup)]);
                    }
                }

                async function processLocks(locks, p){
                    const allTokens=new Set(), raw=[];
                    locks.forEach((l,idx) => {
                        if(!l||!l.beneficiary||l.beneficiary===ethers.constants.AddressZero) return;
                        if(l.amount.isZero()) return;
                        const isOwner=userAddress&&l.beneficiary.toLowerCase()===userAddress.toLowerCase();
                        raw.push({ id:idx, token:l.token, amount:l.amount, unlockTime:l.unlockTime.toNumber(), withdrawn:l.withdrawn, isOwner, beneficiary:l.beneficiary });
                        allTokens.add(l.token.toLowerCase());
                    });
                    const tim=await fetchTokenInfos(p,Array.from(allTokens));
                    const grouped={ all:[], personal:[], allCompleted:[], personalCompleted:[] };
                    raw.forEach(l => { const info=tim[l.token.toLowerCase()]||{symbol:'TOKEN',decimals:18}; if(info.decimals===0) return; l.symbol=info.symbol; l.decimals=info.decimals; if(l.withdrawn){ grouped.allCompleted.push(l); if(l.isOwner) grouped.personalCompleted.push(l); } else { grouped.all.push(l); if(l.isOwner) grouped.personal.push(l); } });
                    Object.keys(grouped).forEach(k => dataStore.lock[k]=grouped[k].sort((a,b)=>a.id-b.id));
                    updateCountDisplays('lock'); renderLockCards();
                }

                function renderLockCards(){
                    const view=dataStore.currentView.lock;

                    source=source.filter(item => !item.amount.isZero());
                    lockListEl.innerHTML=''; clearSkeletons();
                    if(source.length===0){ lockListEl.innerHTML=`<div class="empty-state"><div class="icon">🔍</div><p>${view==='personal'?'您暂无锁仓记录':'暂无锁仓记录'}</p></div>`; return; }
                    const isCompletedView=view.includes('Completed'), now=Math.floor(Date.now()/1000);
                    source.forEach(lock => {
                        const card=document.createElement('div');
                        card.className=`lock-card ${(isCompletedView||lock.withdrawn)?'claimed':''} ${!lock.isOwner&&view==='all'?'not-owner':''}`;
                        card.dataset.lockId=lock.id;
                        // header
                        const header=createEl('div','lock-card-header');
                        const idSpan=createEl('span','lock-id', formatAddress(lock.beneficiary));
                        const copyBtn=createEl('button','copy-addr-btn','复制');
                        copyBtn.dataset.addr=lock.beneficiary;
                        idSpan.appendChild(copyBtn);
                        const statusText=isCompletedView||lock.withdrawn?'✅ 已领取':(now>=lock.unlockTime?'⚡ 可领取':'⏳ 等待解锁');
                        const statusClass=isCompletedView||lock.withdrawn?'status-claimed':(now>=lock.unlockTime?'status-ready':'status-waiting');
                        const statusSpan=createEl('span','lock-status '+statusClass, statusText);
                        header.appendChild(idSpan); header.appendChild(statusSpan);
                        card.appendChild(header);
                        // amount
                        const amountDiv=createEl('div','lock-amount');
                        const numSpan=createEl('span','amount-num', safeFormatUnits(lock.amount,lock.decimals).toLocaleString('zh-CN',{maximumFractionDigits:2}));
                        const unitSpan=createEl('span','amount-unit','枚');
                        const tokenSpan=createEl('span','lock-token', lock.symbol);
                        amountDiv.appendChild(numSpan); amountDiv.appendChild(unitSpan); amountDiv.appendChild(tokenSpan);
                        card.appendChild(amountDiv);
                        // time
                        card.appendChild(createEl('div','lock-time','📅 解锁时间：'+formatDateTime(lock.unlockTime)));
                        // countdown
                        card.appendChild(createEl('div','lock-countdown'));
                        // button
                        if(isCompletedView||lock.withdrawn){
                            const btn=createEl('button','btn-claim','已领取'); btn.disabled=true; btn.style.display='flex';
                            card.appendChild(btn);
                        } else if(!lock.isOwner && view==='all'){
                            card.appendChild(createEl('div','btn-claim-not-owner','这不是您的锁仓无法领取哦！'));
                        } else {
                            const btn=document.createElement('button');
                            btn.className='btn-claim'; btn.id='btnLock'+lock.id; btn.style.display='flex';
                            if(now>=lock.unlockTime){ btn.disabled=false; btn.innerHTML='<span class="spinner"></span><span class="btn-text">🔥 立即领取</span>'; }
                            else { btn.disabled=true; btn.textContent='剩余 '; const cd=createEl('span','lock-countdown'); btn.appendChild(cd); }
                            card.appendChild(btn);
                        }
                        lockListEl.appendChild(card);
                    });
                    rebindLockRefs(); updateAllCards();
                }

                async function processVests(vests, p){
                    const allTokens=new Set(), raw=[];
                    vests.forEach((v,idx) => {
                        if(!v||!v.beneficiary||v.beneficiary===ethers.constants.AddressZero) return;
                        if(v.totalAmount.isZero()) return;
                        const isOwner=userAddress&&v.beneficiary.toLowerCase()===userAddress.toLowerCase();
                        const isCompleted=v.released.gte(v.totalAmount);
                        raw.push({ id:idx, token:v.token, totalAmount:v.totalAmount, cliffTime:v.cliffTime.toNumber(), endTime:v.endTime.toNumber(), releaseInterval:v.releaseInterval.toNumber(), lastClaimTime:v.lastClaimTime.toNumber(), released:v.released, isOwner, isCompleted, beneficiary:v.beneficiary });
                        allTokens.add(v.token.toLowerCase());
                    });
                    const tim=await fetchTokenInfos(p,Array.from(allTokens));
                    const grouped={ all:[], personal:[], allCompleted:[], personalCompleted:[] };
                    raw.forEach(v => { const info=tim[v.token.toLowerCase()]||{symbol:'TOKEN',decimals:18}; if(info.decimals===0) return; v.symbol=info.symbol; v.decimals=info.decimals; if(v.isCompleted){ grouped.allCompleted.push(v); if(v.isOwner) grouped.personalCompleted.push(v); } else { grouped.all.push(v); if(v.isOwner) grouped.personal.push(v); } });
                    Object.keys(grouped).forEach(k => dataStore.vest[k]=grouped[k].sort((a,b)=>a.id-b.id));
                    updateCountDisplays('vest'); renderVestCards();
                }

                function renderVestCards(){
                    const view=dataStore.currentView.vest;
                    let source=dataStore.vest[view]||[];
                    source=source.filter(item => !item.totalAmount.isZero());
                    vestListEl.innerHTML=''; clearSkeletons();
                    if(source.length===0){ vestListEl.innerHTML=`<div class="empty-state"><div class="icon">🔍</div><p>${view==='personal'?'您暂无线性释放记录':'暂无线性释放记录'}</p></div>`; return; }
                    const isCompletedView=view.includes('Completed'), now=Math.floor(Date.now()/1000);
                    source.forEach(vest => {
                        const card=document.createElement('div');
                        card.className=`vest-card ${!vest.isOwner&&view==='all'?'not-owner':''}`;
                        card.dataset.vestId=vest.id;
                        const total=safeFormatUnits(vest.totalAmount,vest.decimals), released=safeFormatUnits(vest.released,vest.decimals);
                        let progress=0, isCliff=now<vest.cliffTime;
                        if(now>=vest.cliffTime){ const tp=vest.endTime-vest.cliffTime, rt=Math.min(now-vest.cliffTime,tp); progress=tp>0?(rt/tp)*100:100; }
                        progress=Math.min(100,Math.max(0,progress));
                        const isFullyReleased=vest.released.gte(vest.totalAmount)||isCompletedView;
                        // header
                        const header=createEl('div','lock-card-header');
                        const idSpan=createEl('span','lock-id', formatAddress(vest.beneficiary));
                        const copyBtn=createEl('button','copy-addr-btn','复制');
                        copyBtn.dataset.addr=vest.beneficiary;
                        idSpan.appendChild(copyBtn);
                        const statusText=isFullyReleased||progress>=100?'✅ 已完全释放':(isCliff?'🔒 悬崖期锁定中':'📈 释放中');
                        const statusClass=isFullyReleased||progress>=100?'status-ready':(isCliff?'status-cliff':'status-waiting');
                        header.appendChild(idSpan); header.appendChild(createEl('span','lock-status '+statusClass, statusText));
                        card.appendChild(header);
                        // amount
                        const amountDiv=createEl('div','lock-amount');
                        amountDiv.appendChild(createEl('span','amount-num', total.toLocaleString('zh-CN',{maximumFractionDigits:2})));
                        amountDiv.appendChild(createEl('span','amount-unit','枚'));
                        amountDiv.appendChild(createEl('span','lock-token', vest.symbol));
                        card.appendChild(amountDiv);
                        // released
                        card.appendChild(createEl('div','',`已领取：${released.toLocaleString('zh-CN',{maximumFractionDigits:2})} ${vest.symbol}`));
                        // progress
                        const progDiv=createEl('div','vest-progress');
                        const progBar=createEl('div','vest-progress-bar'); progBar.style.width=progress.toFixed(1)+'%';
                        progDiv.appendChild(progBar); card.appendChild(progDiv);
                        card.appendChild(createEl('div','vest-progress-text',`释放进度：${progress.toFixed(1)}%`));
                        // available
                        let unlockable=0;
                        if(now>=vest.cliffTime){ const el=now-vest.cliffTime, tp=vest.endTime-vest.cliffTime, ve=tp>0?(total*el)/tp:total; unlockable=Math.max(0,ve-released); if(unlockable>total-released) unlockable=total-released; }
                        card.appendChild(createEl('div','vest-available',`可领取：${unlockable.toLocaleString('zh-CN',{maximumFractionDigits:2})} ${vest.symbol}`));
                        card.appendChild(createEl('div','vest-note','过悬崖期后可线性释放！'));
                        card.appendChild(createEl('div','lock-time','📅 悬崖期结束：'+formatDateTime(vest.cliffTime)));
                        card.appendChild(createEl('div','lock-time','📅 预计释放完成日期：'+formatDateTime(vest.endTime)));
                        // button
                        if(isFullyReleased){
                            const btn=createEl('button','btn-claim-vest','已全部释放'); btn.disabled=true; btn.style.display='flex';
                            card.appendChild(btn);
                        } else if(!vest.isOwner && view==='all'){
                            if(isCliff){ const btn=createEl('button','btn-claim-vest'); btn.disabled=true; btn.style.display='flex'; btn.textContent='⏳ 释放倒计时 '+formatCountdown(vest.cliffTime-now); card.appendChild(btn); }
                            else { card.appendChild(createEl('div','btn-claim-not-owner','这不是您的锁仓无法领取哦！')); }
                        } else {
                            const btn=document.createElement('button');
                            btn.className='btn-claim-vest'; btn.id='btnVest'+vest.id; btn.style.display='flex'; btn.disabled=true;
                            btn.textContent='⏳ ...';
                            card.appendChild(btn);
                        }
                        vestListEl.appendChild(card);
                    });
                    rebindVestRefs(); updateAllCards();
                }

                async function fetchTokenInfos(p,addrs){
                    const unc=[], rm={};
                    for(const a of addrs){ const c=getCachedTokenInfo(a); if(c) rm[a]=c; else unc.push(a); }
                    if(unc.length>0){
                        const sc=unc.map(a=>({target:a,allowFailure:true,callData:new ethers.utils.Interface(['function symbol() view returns (string)']).encodeFunctionData('symbol')}));
                        const dc=unc.map(a=>({target:a,allowFailure:true,callData:new ethers.utils.Interface(['function decimals() view returns (uint8)']).encodeFunctionData('decimals')}));
                        const [sr,dr]=await Promise.all([multicall(p,sc),multicall(p,dc)]);
                        const sd=new ethers.utils.Interface(['function symbol() view returns (string)']), dd=new ethers.utils.Interface(['function decimals() view returns (uint8)']);
                        for(let i=0;i<unc.length;i++){
                            let sym='TOKEN',dec=18;
                            if(sr[i].success) try{ sym=sd.decodeFunctionResult('symbol',sr[i].returnData)[0]; }catch(e){}
                            if(dr[i].success) try{ dec=dd.decodeFunctionResult('decimals',dr[i].returnData)[0]; }catch(e){}
                            rm[unc[i]]={symbol:sym,decimals:dec}; setCachedTokenInfo(unc[i],rm[unc[i]]);
                        }
                    }
                    return rm;
                }

                // ========== 总锁仓统计 ==========
                async function loadTotalLocked(p){
                    try {
                        const lc=new ethers.Contract(CONTRACT_ADDRESS,CONTRACT_ABI,p);
                        const [lcB,vcB]=await Promise.all([lc.lockCount(),lc.vestCount()]);
                        const tlc=lcB.toNumber(), tvc=vcB.toNumber();
                        if(tlc+tvc===0){ animateNumberUpdate(totalLockedEl,'0'); totalLockedSubEl.innerHTML='一次性锁仓 <span class="stat-num">0</span> 笔 · 线性锁仓释放 <span class="stat-num">0</span> 笔'; return; }
                        const lCalls=buildCalls(CONTRACT_ADDRESS,CONTRACT_ABI,'tokenLocks',Array.from({length:tlc},(_,i)=>[i]));
                        const vCalls=buildCalls(CONTRACT_ADDRESS,CONTRACT_ABI,'tokenVests',Array.from({length:tvc},(_,i)=>[i]));
                        const results=await multicallWithPagination(p,[...lCalls,...vCalls]);
                        const locks=decodeResults(results.slice(0,tlc),CONTRACT_ABI,'tokenLocks'), vests=decodeResults(results.slice(tlc),CONTRACT_ABI,'tokenVests');
                        const ta={}; let alc=0,avc=0; const it=new Set();
                        locks.forEach(l=>{ if(l&&!l.withdrawn&&!l.amount.isZero()){ alc++; const a=l.token.toLowerCase(); it.add(a); if(!ta[a])ta[a]=ethers.BigNumber.from(0); ta[a]=ta[a].add(l.amount); } });
                        vests.forEach(v=>{ if(v&&v.released.lt(v.totalAmount)&&!v.totalAmount.isZero()){ avc++; const rem=v.totalAmount.sub(v.released),a=v.token.toLowerCase(); it.add(a); if(!ta[a])ta[a]=ethers.BigNumber.from(0); ta[a]=ta[a].add(rem); } });
                        const tim=await fetchTokenInfos(p,Array.from(it));
                        const parts=[];
                        for(const [a,am] of Object.entries(ta)){ if(am.gt(0)){ const info=tim[a]||{symbol:'TOKEN',decimals:18}; const num=safeFormatUnits(am,info.decimals); if(num>0) parts.push(num.toLocaleString('zh-CN',{maximumFractionDigits:2})); } }
                        animateNumberUpdate(totalLockedEl,parts.length?parts.join(' + '):'0');
                        totalLockedSubEl.innerHTML=`一次性锁仓 <span class="stat-num">${alc}</span> 笔 · 线性锁仓释放 <span class="stat-num">${avc}</span> 笔`;
                    } catch(e){ totalLockedEl.textContent='加载失败'; totalLockedSubEl.textContent='点击刷新重试'; }
                }
                async function refreshTotalLocked() { try { await loadTotalLocked(await getFastestProvider()); } catch(e) {} }

                function updateCountDisplays(type) {
                    const ids=type==='lock'?{all:'allLockActiveCount',personal:'personalLockActiveCount',allCompleted:'allLockCompletedCount',personalCompleted:'personalLockCompletedCount'}:{all:'allActiveCount',personal:'personalActiveCount',allCompleted:'allCompletedCount',personalCompleted:'personalCompletedCount'};
                    for(const [key,id] of Object.entries(ids)){ const el=document.getElementById(id); if(el) el.textContent=(dataStore[type][key]||[]).length; }
                }

                // ========== 领取交易（独立按钮锁） ==========
                async function claimLock(lockId){
                    if(claimLockStatus[lockId]) return;
                    if(!contract||!signer){ showToast('请先连接钱包','error'); return; }
                    const lock=dataStore.lock.all?.find(l=>l.id===lockId)||dataStore.lock.personal?.find(l=>l.id===lockId);
                    if(lock&&!lock.isOwner){ showToast('您不是受益人','error'); return; }
                    if(lock&&lock.unlockTime>Math.floor(Date.now()/1000)){ showToast('尚未到解锁时间','error'); return; }
                    const btn=document.getElementById('btnLock'+lockId);
                    if(btn){ btn.classList.add('loading'); btn.disabled=true; btn.style.pointerEvents='none'; }
                    claimLockStatus[lockId]=true;
                    try { const tx=await contract.withdrawLock(lockId); showToast('交易已提交，等待确认...','','',tx.hash); await tx.wait(); showToast(`锁仓 #${lockId} 领取成功！🎉`,'success',tx.hash); await loadAllData(); }
                    catch(err){ let msg='领取失败'; if(err.code===4001) msg='用户取消了交易'; else if(err.message?.includes('Not beneficiary')) msg='您不是受益人'; else if(err.message?.includes('Not unlock yet')) msg='尚未到解锁时间'; else if(err.message?.includes('Already withdrawn')) msg='已被领取'; else if(err.message) msg='领取失败: '+err.message; showToast(msg,'error'); }
                    finally { claimLockStatus[lockId]=false; if(btn){ btn.classList.remove('loading'); btn.disabled=false; btn.style.pointerEvents=''; } updateAllCards(); }
                }
                async function claimVest(vestId){
                    if(claimVestStatus[vestId]) return;
                    if(!contract||!signer){ showToast('请先连接钱包','error'); return; }
                    const vest=dataStore.vest.all?.find(v=>v.id===vestId)||dataStore.vest.personal?.find(v=>v.id===vestId);
                    if(vest&&!vest.isOwner){ showToast('您不是受益人','error'); return; }
                    if(vest&&vest.cliffTime>Math.floor(Date.now()/1000)){ showToast('悬崖期尚未结束','error'); return; }
                    const btn=document.getElementById('btnVest'+vestId);
                    if(btn){ btn.classList.add('loading'); btn.disabled=true; btn.style.pointerEvents='none'; btn.innerHTML='<span class="spinner"></span><span class="btn-text">⏳ 处理中...</span>'; }
                    claimVestStatus[vestId]=true;
                    try { const tx=await contract.withdrawVest(vestId); showToast('交易已提交，等待确认...','','',tx.hash); await tx.wait(); showToast(`线性释放 #${vestId} 领取成功！🎉`,'success',tx.hash); await loadAllData(); }
                    catch(err){ let msg='领取失败'; if(err.code===4001) msg='用户取消了交易'; else if(err.message?.includes('Not beneficiary')) msg='您不是受益人'; else if(err.message?.includes('Wait for next cycle')) msg='请等待下一个领取周期'; else if(err.message?.includes('No token to claim')) msg='当前无可领取代币'; else if(err.message?.includes('Cliff not over')) msg='悬崖期尚未结束'; else if(err.message) msg='领取失败: '+err.message; showToast(msg,'error'); }
                    finally { claimVestStatus[vestId]=false; if(btn){ btn.classList.remove('loading'); btn.disabled=false; btn.style.pointerEvents=''; btn.textContent='🔥 领取代币'; } updateAllCards(); }
                }

                // ========== 钱包事件监听 ==========
                const handleAccountsChanged = (accounts) => { if(!accounts.length) disconnectWallet(); else if(accounts[0]!==userAddress) setupWallet(accounts[0]); };
                const handleChainChanged = (hexChainId) => { const newId=parseInt(hexChainId,16); if(newId===cachedChainId) return; if(newId===CHAIN_ID&&userAddress) setupWallet(userAddress); else disconnectWallet(); };
                if(window.ethereum){
                    window.ethereum.on('accountsChanged', handleAccountsChanged);
                    window.ethereum.on('chainChanged', handleChainChanged);
                }

                // ========== 自动初始化 ==========
                (async function autoInit(){
                    loadViewState();
                    try { const rp=await getFastestProvider(); await loadTotalLocked(rp); } catch(e){ totalLockedEl.textContent='网络错误'; totalLockedSubEl.textContent='请检查网络后刷新'; }
                    if(window.ethereum){
                        try {
                            let accounts=[];
                            try { accounts=await window.ethereum.request({method:'wallet_getAccounts'}); } catch(e){}
                            if(!accounts.length) accounts=await window.ethereum.request({method:'eth_accounts'});
                            if(accounts.length) await setupWallet(accounts[0]);
                        } catch(e){}
                    }
                    applyViewState();
                })();
            })();
        });
    </script>
